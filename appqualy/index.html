<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tintas Qualy Quimy - PDV</title>
    <style>
        :root {
            --primary: #0056b3;
            --secondary: #6c757d;
            --success: #28a745;
            --danger: #dc3545;
            --dark: #343a40;
        }

        body { font-family: Arial; background: #e9ecef; margin: 0; display: flex; flex-direction: column; height: 100vh; }

        header { text-align: center; padding: 15px; background: white; border-bottom: 4px solid var(--primary); }

        .container { flex: 1; overflow-y: auto; padding: 20px; text-align: center; }

        .grid-buttons { display: grid; gap: 10px; max-width: 400px; margin: auto; }

        .btn-main {
            background: white;
            border: 2px solid var(--primary);
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        .product-item {
            background: white;
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }

        .cart-footer {
            background: var(--dark);
            color: white;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<header>
    <h2>Tintas Qualy Quimy</h2>
</header>

<div class="container">

    <div id="cats">
        <div class="grid-buttons">
            <button class="btn-main" onclick="showProducts('Tintas')">TINTAS</button>
            <button class="btn-main" onclick="showProducts('Massas')">MASSAS</button>
            <button class="btn-main" onclick="showProducts('Texturas')">TEXTURAS</button>
            <button class="btn-main" onclick="showProducts('Selantes')">SELANTES</button>
            <button class="btn-main" onclick="showProducts('Complementos')">COMPLEMENTOS</button>
        </div>
    </div>

    <div id="products" style="display:none;">
        <button onclick="back()">← Voltar</button>
        <h3 id="title"></h3>
        <div id="list"></div>
    </div>

</div>

<div class="cart-footer">
    <span id="cart">0 itens | R$ 0.00</span>
</div>

<script>
let db = {};
let cart = [];
let carregado = false;

// 🔥 carregar JSON com segurança
fetch('produtos.json')
.then(r => r.json())
.then(data => {
    data.forEach(i => {

        // ignora linha ruim
        if (!i.categoria || !i.nome || i.preco == null) return;

        if(!db[i.categoria]) db[i.categoria] = [];

        db[i.categoria].push({
            n: i.nome,
            p: Number(i.preco)
        });
    });

    carregado = true;
    console.log("Produtos carregados:", db);
})
.catch(err => {
    alert("Erro ao carregar produtos.json");
    console.error(err);
});

// mostrar produtos
function showProducts(cat){

    if(!carregado){
        alert("Carregando produtos... aguarde 1 segundo");
        return;
    }

    document.getElementById('cats').style.display='none';
    document.getElementById('products').style.display='block';
    document.getElementById('title').innerText = cat;

    let list = document.getElementById('list');
    list.innerHTML='';

    if(!db[cat] || db[cat].length === 0){
        list.innerHTML='Nenhum produto encontrado';
        return;
    }

    db[cat].forEach(p=>{
        let div=document.createElement('div');
        div.className='product-item';
        div.innerHTML=`${p.n} <b>R$ ${p.p.toFixed(2)}</b>`;
        div.onclick=()=>add(p);
        list.appendChild(div);
    });
}

// voltar
function back(){
    document.getElementById('cats').style.display='block';
    document.getElementById('products').style.display='none';
}

// adicionar carrinho
function add(p){
    cart.push(p);
    updateCart();
}

// atualizar carrinho
function updateCart(){
    let total = cart.reduce((a,b)=>a+b.p,0);
    document.getElementById('cart').innerText = cart.length + " itens | R$ " + total.toFixed(2);
}
</script>

</body>
</html>
