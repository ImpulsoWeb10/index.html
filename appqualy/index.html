<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Vendas - Tintas v1.0</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f5f6fa;
            --card-bg: #ffffff;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* HEADER & CATEGORIAS */
        header { background: white; padding: 15px; border-bottom: 1px solid #ddd; }
        .categories { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .cat-btn { background: white; border: 1px solid #ddd; padding: 8px 15px; border-radius: 20px; white-space: nowrap; cursor: pointer; }
        .cat-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* GRID DE PRODUTOS */
        .main-content { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        
        .product-card {
            background: var(--card-bg); border-radius: 12px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-align: center; cursor: pointer; transition: 0.2s; position: relative;
        }
        .product-card:hover { transform: translateY(-3px); }
        .product-card img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 10px; }
        .product-card h3 { margin: 5px 0; font-size: 0.9rem; color: #333; height: 35px; overflow: hidden; }
        .product-card .price { font-weight: bold; color: var(--accent); font-size: 1.1rem; }
        .stock-tag { font-size: 0.7rem; color: #888; display: block; margin-top: 5px; }

        /* MODAL DE QUANTIDADE */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal {
            background: white; width: 90%; max-width: 400px; border-radius: 20px; padding: 25px;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: pop 0.3s ease;
        }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .qty-control { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 25px 0; }
        .btn-circle {
            width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 24px;
            color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .btn-minus { background: var(--danger); }
        .btn-plus { background: var(--success); }
        .qty-number { font-size: 2.5rem; font-weight: bold; min-width: 60px; }

        /* BARRA INFERIOR / CARRINHO */
        .cart-bar {
            background: var(--primary); color: white; padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 20px 20px 0 0;
        }
        .btn-checkout { background: var(--success); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }

        /* FORMAS DE PAGAMENTO NO CHECKOUT */
        .pay-methods { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .pay-btn { padding: 10px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; background: #f9f9f9; }
        .pay-btn:active { background: #eee; }
    </style>
</head>
<body>

<header>
    <div class="categories">
        <button class="cat-btn active">Todas</button>
        <button class="cat-btn">Acrílicas</button>
        <button class="cat-btn">Esmaltes</button>
        <button class="cat-btn">Acessórios</button>
        <button class="cat-btn">Vernizes</button>
    </div>
</header>

<div class="main-content" id="productGrid">
    <div class="product-card" onclick="openModal('Tinta Branco Neve 18L', 149.90)">
        <img src="https://cdn-icons-png.flaticon.com/512/1041/1041846.png" alt="tinta">
        <h3>Tinta Branco Neve 18L</h3>
        <span class="price">R$ 149,90</span>
        <span class="stock-tag">Estoque: 12 un</span>
    </div>

    <div class="product-card" onclick="openModal('Rolo de Lã 23cm', 22.50)">
        <img src="https://cdn-icons-png.flaticon.com/512/2830/2830310.png" alt="rolo">
        <h3>Rolo de Lã 23cm</h3>
        <span class="price">R$ 22,50</span>
        <span class="stock-tag">Estoque: 45 un</span>
    </div>

    <div class="product-card" onclick="openModal('Verniz Brilhante 3,6L', 89.00)">
        <img src="https://cdn-icons-png.flaticon.com/512/1041/1041846.png" alt="verniz">
        <h3>Verniz Brilhante 3,6L</h3>
        <span class="price">R$ 89,00</span>
        <span class="stock-tag">Estoque: 8 un</span>
    </div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <h2 id="modalTitle">Produto</h2>
        <p id="modalPrice" style="color: var(--accent); font-weight: bold;">R$ 0,00</p>
        
        <div class="qty-control">
            <button class="btn-circle btn-minus" onclick="updateQty(-1)">-</button>
            <span class="qty-number" id="qtyVal">1</span>
            <button class="btn-circle btn-plus" onclick="updateQty(1)">+</button>
        </div>

        <button onclick="addToCart()" style="width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer;">
            Adicionar ao Carrinho
        </button>
        <p onclick="closeModal()" style="margin-top: 15px; color: #999; cursor: pointer;">Cancelar</p>
    </div>
</div>

<div class="cart-bar">
    <div>
        <span id="cartCount">0 itens</span><br>
        <strong id="cartTotal" style="font-size: 1.4rem;">R$ 0,00</strong>
    </div>
    <button class="btn-checkout" onclick="finishOrder()">CONCLUIR PEDIDO</button>
</div>

<script>
    let currentProduct = { name: '', price: 0 };
    let currentQty = 1;
    let cart = [];

    function openModal(name, price) {
        currentProduct = { name, price };
        currentQty = 1;
        document.getElementById('modalTitle').innerText = name;
        document.getElementById('modalPrice').innerText = `R$ ${price.toFixed(2)}`;
        document.getElementById('qtyVal').innerText = currentQty;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    function updateQty(val) {
        currentQty += val;
        if (currentQty < 1) currentQty = 1;
        document.getElementById('qtyVal').innerText = currentQty;
    }

    function addToCart() {
        const item = { ...currentProduct, qty: currentQty };
        cart.push(item);
        updateCartUI();
        closeModal();
    }

    function updateCartUI() {
        const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
        const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        
        document.getElementById('cartCount').innerText = `${totalItems} itens no carrinho`;
        document.getElementById('cartTotal').innerText = `R$ ${totalPrice.toFixed(2)}`;
    }

    function finishOrder() {
        if (cart.length === 0) return alert("Carrinho vazio!");
        
        const method = prompt("Selecione a Forma de Pagamento:\n1. Pix\n2. Cartão\n3. Dinheiro\n4. Faturado");
        if (method) {
            alert("Pedido registrado com sucesso no estoque!");
            cart = [];
            updateCartUI();
        }
    }
</script>

</body>
</html>
