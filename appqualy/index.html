<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Pedidos - Tintas</title>
    <style>
        :root {
            --primary: #3498db; /* Azul para Tintas */
            --accent: #f1c40f; /* Amarelo para destaque */
            --danger: #e74c3c;
            --dark: #2c3e50;
            --bg: #f4f7f6;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; padding-bottom: 90px; }
        
        h2 { color: var(--dark); border-bottom: 2px solid var(--primary); padding-bottom: 10px; }

        /* Grade de Tintas */
        .grid-produtos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: 0.2s;
        }

        .card:active { transform: scale(0.98); }
        .card h3 { margin: 0; font-size: 0.9rem; color: #555; text-transform: uppercase; }
        .card .cor-preview { width: 100%; height: 10px; border-radius: 5px; margin: 8px 0; background: #ddd; }
        .card p { color: var(--dark); font-weight: bold; margin: 5px 0 0; font-size: 1.1rem; }
        .card span { font-size: 0.75rem; color: #888; }

        /* Modal Responsivo de Tintas */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: white; width: 90%; max-width: 400px;
            border-radius: 20px; padding: 20px; text-align: center;
        }

        .selector-volume {
            display: flex; justify-content: space-around; margin: 20px 0;
        }

        .btn-volume {
            padding: 8px 15px; border: 1px solid #ddd; border-radius: 20px; background: white; cursor: pointer;
        }

        .btn-volume.active { background: var(--primary); color: white; border-color: var(--primary); }

        .controles-qtd {
            display: flex; align-items: center; justify-content: center; gap: 30px; margin: 20px 0;
        }

        .btn-circular {
            width: 60px; height: 60px; border-radius: 50%; border: none;
            font-size: 28px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* Carrinho */
        .barra-carrinho {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--dark); color: white; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box; box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
        }

        .btn-finalizar {
            background: var(--accent); color: var(--dark); border: none;
            padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Estoque de Tintas / Pedidos</h2>
    
    <div class="grid-produtos">
        <div class="card" onclick="abrirModal('Tinta Acrílica Fosca - Branco', 120.00, '#ffffff')">
            <div class="cor-preview" style="background: #ffffff; border: 1px solid #eee;"></div>
            <h3>Acrílica Branco</h3>
            <span>Lata 18L</span>
            <p>R$ 120,00</p>
        </div>

        <div class="card" onclick="abrirModal('Tinta Premium - Azul Naval', 155.00, '#2c3e50')">
            <div class="cor-preview" style="background: #2c3e50;"></div>
            <h3>Azul Naval</h3>
            <span>Lata 18L</span>
            <p>R$ 155,00</p>
        </div>

        <div class="card" onclick="abrirModal('Massa Corrida', 45.00, '#f1f1f1')">
            <div class="cor-preview" style="background: #f1f1f1; border: 1px solid #eee;"></div>
            <h3>Massa Corrida</h3>
            <span>Barrica 25kg</span>
            <p>R$ 45,00</p>
        </div>

        <div class="card" onclick="abrirModal('Esmalte Sintético - Gelo', 38.00, '#e8ecef')">
            <div class="cor-preview" style="background: #e8ecef;"></div>
            <h3>Esmalte Gelo</h3>
            <span>3,6 Litros</span>
            <p>R$ 38,00</p>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2 id="modal-titulo" style="margin-bottom: 5px;">Produto</h2>
            <div id="modal-cor" style="width: 50px; height: 50px; border-radius: 50%; margin: 10px auto; border: 2px solid #eee;"></div>
            
            <p id="modal-preco" style="font-size: 1.4rem; font-weight: bold; color: var(--primary);">R$ 0,00</p>
            
            <div class="controles-qtd">
                <button class="btn-circular" style="background: var(--danger);" onclick="mudarQtd(-1)">−</button>
                <span id="qtd-valor" style="font-size: 2.5rem; font-weight: bold;">1</span>
                <button class="btn-circular" style="background: var(--primary);" onclick="mudarQtd(1)">+</button>
            </div>

            <button onclick="adicionarAoCarrinho()" style="width: 100%; padding: 18px; border-radius: 40px; border: none; background: var(--dark); color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer;">
                Confirmar Itens
            </button>
            <p onclick="fecharModal()" style="margin-top: 20px; color: #999; cursor: pointer; font-weight: bold;">Voltar</p>
        </div>
    </div>

    <div class="barra-carrinho">
        <div>
            <span id="itens-total" style="color: #bdc3c7; font-size: 0.9rem;">Carrinho Vazio</span><br>
            <strong id="valor-total" style="font-size: 1.2rem;">R$ 0,00</strong>
        </div>
        <button class="btn-finalizar" onclick="finalizarPedido()">FECHAR VENDA</button>
    </div>

    <script>
        let carrinho = [];
        let produtoAtual = {};
        let qtdModal = 1;

        function abrirModal(nome, preco, corHex) {
            produtoAtual = { nome, preco };
            qtdModal = 1;
            document.getElementById('modal-titulo').innerText = nome;
            document.getElementById('modal-cor').style.backgroundColor = corHex;
            document.getElementById('modal-preco').innerText = `R$ ${preco.toFixed(2)}`;
            document.getElementById('qtd-valor').innerText = qtdModal;
            document.getElementById('modal').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function mudarQtd(valor) {
            qtdModal += valor;
            if (qtdModal < 1) qtdModal = 1;
            document.getElementById('qtd-valor').innerText = qtdModal;
        }

        function adicionarAoCarrinho() {
            const item = { ...produtoAtual, qtd: qtdModal };
            carrinho.push(item);
            atualizarBarra();
            fecharModal();
        }

        function atualizarBarra() {
            const totalItens = carrinho.reduce((sum, item) => sum + item.qtd, 0);
            const totalValor = carrinho.reduce((sum, item) => sum + (item.preco * item.qtd), 0);
            
            document.getElementById('itens-total').innerText = `${totalItens} unidades no total`;
            document.getElementById('valor-total').innerText = `R$ ${totalValor.toFixed(2)}`;
        }

        function finalizarPedido() {
            if(carrinho.length === 0) return alert("Adicione produtos primeiro!");
            
            const pagamento = prompt("Forma de Pagamento:\n1. Pix\n2. Cartão Débito/Crédito\n3. Dinheiro\n4. Faturado (Nota)");
            
            if(pagamento) {
                alert("✅ Pedido Gravado com Sucesso!\n\nOs itens foram deduzidos do estoque e o financeiro foi atualizado.");
                carrinho = [];
                atualizarBarra();
            }
        }
    </script>
</body>
</html>
