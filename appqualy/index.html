<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDV</title>

<style>
body { font-family: Arial; background:#eee; margin:0; }
.container { padding:20px; text-align:center; }
button { padding:15px; margin:5px; width:200px; }
.product { background:#fff; margin:5px; padding:10px; }
</style>
</head>

<body>

<div class="container">

<div id="cats">
    <button onclick="showProducts('Tintas')">TINTAS</button>
    <button onclick="showProducts('Massas')">MASSAS</button>
    <button onclick="showProducts('Texturas')">TEXTURAS</button>
    <button onclick="showProducts('Selantes')">SELANTES</button>
    <button onclick="showProducts('Complementos')">COMPLEMENTOS</button>
</div>

<div id="products" style="display:none;">
    <button onclick="back()">VOLTAR</button>
    <h3 id="title"></h3>
    <div id="list"></div>
</div>

</div>

<script>

let db = {};
let carregado = false;

// 🔥 GARANTE QUE JS ESTÁ RODANDO
console.log("JS carregado");

// carregar JSON
fetch('produtos.json')
.then(r => r.json())
.then(data => {

    console.log("JSON carregado");

    data.forEach(i => {
        if(!i.categoria) return;

        if(!db[i.categoria]) db[i.categoria] = [];

        db[i.categoria].push({
            n: i.nome,
            p: Number(i.preco)
        });
    });

    carregado = true;
})
.catch(err => {
    alert("ERRO no JSON ou caminho errado");
    console.log(err);
});

// clicar botão
function showProducts(cat){

    console.log("clicou:", cat);

    if(!carregado){
        alert("Ainda carregando...");
        return;
    }

    document.getElementById('cats').style.display='none';
    document.getElementById('products').style.display='block';
    document.getElementById('title').innerText = cat;

    let list = document.getElementById('list');
    list.innerHTML = "";

    if(!db[cat]){
        list.innerHTML = "Nenhum produto";
        return;
    }

    db[cat].forEach(p=>{
        let div = document.createElement('div');
        div.className = "product";
        div.innerText = p.n + " - R$ " + p.p;
        list.appendChild(div);
    });
}

// voltar
function back(){
    document.getElementById('cats').style.display='block';
    document.getElementById('products').style.display='none';
}

</script>

</body>
</html>
