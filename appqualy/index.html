
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini PDV Inteligente</title>
    <style>
        :root {
            --primary: #2ecc71;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #f8f9fa;
        }

        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; margin: 0; padding: 20px; padding-bottom: 80px; }
        
        /* Grade de Produtos */
        .grid-produtos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .card:active { transform: scale(0.95); }
        .card h3 { margin: 10px 0 5px; font-size: 1rem; color: var(--dark); }
        .card p { color: var(--primary); font-weight: bold; margin: 0; }

        /* Modal Responsivo */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none; align-items: center; justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .controles-qtd {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin: 25px 0;
        }

        .btn-circular {
            width: 55px; height: 55px; border-radius: 50%; border: none;
            font-size: 24px; color: white; cursor: pointer;
        }

        /* Barra de Carrinho inferior */
        .barra-carrinho {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--dark); color: white;
            padding: 15px 20px; display: flex;
            justify-content: space-between; align-items: center;
            box-sizing: border-box;
            border-radius: 15px 15px 0 0;
        }

        .btn-finalizar {
            background: var(--primary); color: white; border: none;
            padding: 10px 20px; border-radius: 8px; font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Cardápio Digital</h2>
    
    <div class="grid-produtos">
        <div class="card" onclick="abrirModal('Hambúrguer Gourmet', 25.00)">
            <h3>Hambúrguer</h3>
            <p>R$ 25,00</p>
        </div>
        <div class="card" onclick="abrirModal('Batata Frita', 15.00)">
            <h3>Batata Frita</h3>
            <p>R$ 15,00</p>
        </div>
        <div class="card" onclick="abrirModal('Refrigerante', 7.00)">
            <h3>Refrigerante</h3>
            <p>R$ 7,00</p>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2 id="modal-titulo">Produto</h2>
            <p id="modal-preco">R$ 0,00</p>
            
            <div class="controles-qtd">
                <button class="btn-circular" style="background: var(--danger);" onclick="mudarQtd(-1)">-</button>
                <span id="qtd-valor" style="font-size: 2rem; font-weight: bold;">1</span>
                <button class="btn-circular" style="background: var(--primary);" onclick="mudarQtd(1)">+</button>
            </div>

            <button onclick="adicionarAoCarrinho()" style="width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--dark); color: white; font-size: 1.1rem; cursor: pointer;">
                Adicionar ao Pedido
            </button>
            <p onclick="fecharModal()" style="margin-top: 15px; color: #777; cursor: pointer;">Cancelar</p>
        </div>
    </div>

    <div class="barra-carrinho">
        <div>
            <span id="itens-total">0 itens</span><br>
            <strong id="valor-total">R$ 0,00</strong>
        </div>
        <button class="btn-finalizar" onclick="finalizarPedido()">FECHAR PEDIDO</button>
    </div>

    <script>
        let carrinho = [];
        let produtoAtual = {};
        let qtdModal = 1;

        function abrirModal(nome, preco) {
            produtoAtual = { nome, preco };
            qtdModal = 1;
            document.getElementById('modal-titulo').innerText = nome;
            document.getElementById('modal-preco').innerText = `R$ ${preco.toFixed(2)}`;
            document.getElementById('qtd-valor').innerText = qtdModal;
            document.getElementById('modal').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function mudarQtd(valor) {
            qtdModal += valor;
            if (qtdModal < 1) qtdModal = 1;
            document.getElementById('qtd-valor').innerText = qtdModal;
        }

        function adicionarAoCarrinho() {
            const item = { ...produtoAtual, qtd: qtdModal };
            carrinho.push(item);
            atualizarBarra();
            fecharModal();
        }

        function atualizarBarra() {
            const totalItens = carrinho.reduce((sum, item) => sum + item.qtd, 0);
            const totalValor = carrinho.reduce((sum, item) => sum + (item.preco * item.qtd), 0);
            
            document.getElementById('itens-total').innerText = `${totalItens} itens`;
            document.getElementById('valor-total').innerText = `R$ ${totalValor.toFixed(2)}`;
        }

        function finalizarPedido() {
            if(carrinho.length === 0) return alert("Carrinho vazio!");
            
            let resumo = "--- NOVO PEDIDO ---\n";
            carrinho.forEach(item => {
                resumo += `${item.qtd}x ${item.nome} - R$ ${(item.preco * item.qtd).toFixed(2)}\n`;
            });
            
            const formaPgto = prompt("Qual a forma de pagamento?\n1. Pix\n2. Cartão\n3. Dinheiro");
            alert(resumo + "\nEnviando para produção...");
            carrinho = [];
            atualizarBarra();
        }
    </script>
</body>
</html>
