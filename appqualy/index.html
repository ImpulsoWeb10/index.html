<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tintas Qualy Quimy - PDV</title>
    <style>
        :root {
            --primary: #0056b3;
            --secondary: #6c757d;
            --success: #28a745;
            --danger: #dc3545;
            --light: #f8f9fa;
            --dark: #343a40;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: #e9ecef; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }

        header { text-align: center; padding: 20px; background: white; border-bottom: 4px solid var(--primary); }
        header h1 { margin: 0; color: var(--primary); font-size: 24px; text-transform: uppercase; }
        header p { margin: 5px 0 0; color: var(--secondary); font-style: italic; }

        .container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h2.section-title { color: var(--dark); margin-bottom: 20px; }

        .grid-buttons { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .btn-main { 
            background: white; border: 2px solid var(--primary); color: var(--primary);
            padding: 20px; border-radius: 12px; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: 0.2s; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-main:active { transform: scale(0.95); background: var(--primary); color: white; }

        #product-list { display: none; width: 100%; max-width: 500px; }
        .product-item { 
            background: white; margin-bottom: 10px; padding: 15px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; border-left: 5px solid var(--primary);
        }

        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            display: none; align-items: center; justify-content: center; z-index: 1000; 
        }
        .modal { 
            background: white; width: 90%; max-width: 350px; border-radius: 20px; 
            padding: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .qty-box { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 20px 0; }
        .btn-qty { width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 24px; color: white; cursor: pointer; }
        .qty-val { font-size: 30px; font-weight: bold; }

        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-back { background: var(--secondary); color: white; margin-bottom: 15px; }
        .btn-add { background: var(--success); color: white; }
        
        .cart-footer { background: var(--dark); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<header>
    <h1>Tintas Qualy Quimy</h1>
    <p>Qualidade em tintas e complementos</p>
</header>

<div class="container">
    <div id="view-categories" style="width: 100%; text-align: center;">
        <h2 class="section-title">Categorias</h2>
        <div class="grid-buttons">
            <button class="btn-main" onclick="showProducts('Tintas')">TINTAS</button>
            <button class="btn-main" onclick="showProducts('Massas')">MASSAS</button>
            <button class="btn-main" onclick="showProducts('Texturas')">TEXTURAS</button>
            <button class="btn-main" onclick="showProducts('Selantes')">SELANTES</button>
            <button class="btn-main" onclick="showProducts('Complementos')">COMPLEMENTOS</button>
        </div>
    </div>

    <div id="view-products" style="display: none; width: 100%; max-width: 500px;">
        <button class="btn-action btn-back" onclick="showCategories()">← Voltar para Categorias</button>
        <h2 id="cat-title" style="text-align: center;">Produtos</h2>
        <div id="product-list-container"></div>
    </div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <h2 id="modal-p-name">Produto</h2>
        <p id="modal-p-price" style="font-size: 20px; color: var(--primary); font-weight: bold;">R$ 0,00</p>
        
        <div class="qty-box">
            <button class="btn-qty" style="background: var(--danger);" onclick="changeQty(-1)">-</button>
            <span class="qty-val" id="qty-display">1</span>
            <button class="btn-qty" style="background: var(--success);" onclick="changeQty(1)">+</button>
        </div>

        <button class="btn-action btn-add" onclick="confirmAdd()">Adicionar ao Pedido</button>
        <button class="btn-action btn-back" onclick="closeModal()" style="background: none; color: var(--secondary);">Voltar</button>
    </div>
</div>

<div class="cart-footer">
    <div id="cart-info">0 itens | R$ 0,00</div>
    <button onclick="finishOrder()" style="background: var(--success); border: none; color: white; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer;">Finalizar</button>
</div>

<script>
    let db = {};
    let cart = [];
    let tempProduct = null;
    let tempQty = 1;

    // 🔥 CARREGA OS PRODUTOS DO JSON
    fetch('produtos.json')
      .then(res => res.json())
      .then(data => {
        data.forEach(item => {
          if (!db[item.categoria]) {
            db[item.categoria] = [];
          }
          db[item.categoria].push({
            n: item.nome,
            p: item.preco
          });
        });
      });

    function showProducts(cat) {
        document.getElementById('view-categories').style.display = 'none';
        document.getElementById('view-products').style.display = 'block';
        document.getElementById('cat-title').innerText = cat;
        
        const container = document.getElementById('product-list-container');
        container.innerHTML = "";

        if (!db[cat]) {
            container.innerHTML = "<p>Nenhum produto encontrado.</p>";
            return;
        }
        
        db[cat].forEach(p => {
            const div = document.createElement('div');
            div.className = 'product-item';
            div.innerHTML = `<span>${p.n}</span> <strong>R$ ${p.p.toFixed(2)}</strong>`;
            div.onclick = () => openModal(p);
            container.appendChild(div);
        });
    }

    function showCategories() {
        document.getElementById('view-categories').style.display = 'block';
        document.getElementById('view-products').style.display = 'none';
    }

    function openModal(product) {
        tempProduct = product;
        tempQty = 1;
        document.getElementById('modal-p-name').innerText = product.n;
        document.getElementById('modal-p-price').innerText = `R$ ${product.p.toFixed(2)}`;
        document.getElementById('qty-display').innerText = tempQty;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function changeQty(val) {
        tempQty += val;
        if (tempQty < 1) tempQty = 1;
        document.getElementById('qty-display').innerText = tempQty;
    }

    function confirmAdd() {
        cart.push({ ...tempProduct, qty: tempQty });
        updateCart();
        closeModal();
    }

    function updateCart() {
        const totalItems = cart.reduce((acc, i) => acc + i.qty, 0);
        const totalPrice = cart.reduce((acc, i) => acc + (i.p * i.qty), 0);
        document.getElementById('cart-info').innerText = `${totalItems} itens | R$ ${totalPrice.toFixed(2)}`;
    }

    function finishOrder() {
        if (cart.length === 0) return alert("Adicione itens!");
        const total = cart.reduce((acc, i) => acc + (i.p * i.qty), 0);
        const pgto = prompt("Total: R$ " + total.toFixed(2) + "\nForma de Pagamento:\n1. Pix\n2. Cartão\n3. Dinheiro");
        if (pgto) {
            alert("Pedido Enviado!");
            cart = [];
            updateCart();
            showCategories();
        }
    }
</script>

</body>
</html>
