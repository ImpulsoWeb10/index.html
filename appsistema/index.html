<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorias de Pintura e Acabamento</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .menu-container {
            background: #ffffff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        /* Estrutura das Categorias */
        .categoria-lista {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .categoria-item {
            margin-bottom: 8px;
        }

        /* Estilo dos botões/links principais */
        details {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        details[open] {
            border-color: var(--primary-color);
        }

        summary {
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary::after {
            content: "➔";
            font-size: 0.8rem;
            transition: transform 0.2s ease;
        }

        details[open] summary::after {
            transform: rotate(90deg);
        }

        /* Estilo para item único direto (sem subcategoria) */
        .item-direto {
            display: block;
            padding: 12px;
            font-weight: 600;
            text-decoration: none;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }

        .item-direto:hover, summary:hover {
            background-color: #f1f5f9;
        }

        /* Subcategorias interna */
        .subcategoria-lista {
            list-style: none;
            padding: 0 12px 12px 24px;
            margin: 0;
            border-top: 1px solid var(--border-color);
        }

        .subcategoria-lista li {
            padding: 8px 0;
        }

        .subcategoria-lista a {
            text-decoration: none;
            color: #475569;
            font-size: 0.95rem;
        }

        .subcategoria-lista a:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

<div class="menu-container">
    <h2>Categorias</h2>
    
    <ul class="categoria-lista">
        
        <!-- Categoria 1: Tintas (Com Subcategorias) -->
        <li class="categoria-item">
            <details>
                <summary>Tintas</summary>
                <ul class="subcategoria-lista">
                    <li><a href="#tintas-acrilicas">Tintas Acrílicas</a></li>
                    <li><a href="#tintas-latex">Tintas Látex / PVA</a></li>
                    <li><a href="#tintas-esmalte">Tintas Esmalte</a></li>
                    <li><a href="#tintas-epoxi">Tintas Epóxi</a></li>
                </ul>
            </details>
        </li>

        <!-- Categoria 2: Massa PVA ou Acrílica (Com Subcategorias) -->
        <li class="categoria-item">
            <details>
                <summary>Massa PVA ou Acrílica</summary>
                <ul class="subcategoria-lista">
                    <li><a href="#massa-pva">Massa Corrida PVA (Interior)</a></li>
                    <li><a href="#massa-acrilica">Massa Acrílica (Exterior/Interior)</a></li>
                </ul>
            </details>
        </li>

        <!-- Categoria 3: Texturas (Item Direto - Exemplo se só tiver uma coisa) -->
        <li class="categoria-item">
            <a href="#texturas" class="item-direto">Texturas</a>
        </li>

        <!-- Categoria 4: Selantes (Com Subcategorias) -->
        <li class="categoria-item">
            <details>
                <summary>Selantes</summary>
                <ul class="subcategoria-lista">
                    <li><a href="#selador-acrilico">Selador Acrílico</a></li>
                    <li><a href="#fundo-preparador">Fundo Preparador</a></li>
                </ul>
            </details>
        </li>

    </ul>
</div>

</body>
</html>
