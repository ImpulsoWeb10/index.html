<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Administrativo - Tintas Qualy Quimy</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        /* ==========================================================================
           DESIGN SYSTEM (Stripe / Vercel Aesthetic)
           ========================================================================== */
        :root {
            --bg: #FAFAFA;
            --surface: #FFFFFF;
            --border: #EEEEEE;
            --border-focus: #0F52BA;
            --text: #111111;
            --text-muted: #666666;
            --primary: #0F52BA;
            --primary-light: #F0F6FF;
            --success: #00B159;
            --success-light: #E6F7ED;
            --danger: #DF1414;
            --danger-light: #FCE8E8;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.02);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.03), 0 1px 3px rgba(0,0,0,0.02);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.06);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }

        /* ==========================================================================
           LAYOUT STRUCTURE
           ========================================================================== */
        .admin-container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
        
        .header-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .brand h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
        .brand p { font-size: 13px; color: var(--text-muted); font-weight: 500; }
        
        /* Navigation Tabs */
        .nav-tabs { display: flex; gap: 8px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
        .tab-btn { background: none; border: none; padding: 12px 16px; font-size: 14px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: var(--transition); }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* KPI Dashboard Grid */
        .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 32px; }
        @media(min-width: 768px) { .kpi-grid { grid-template-columns: repeat(4, 1fr); gap: 16px; } }
        
        .kpi-card { background: var(--surface); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
        .kpi-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .kpi-value { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }

        /* Utilities Controls (Search, Filters, Order) */
        .controls-row { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
        @media(min-width: 768px) { .controls-row { flex-direction: row; align-items: center; justify-content: space-between; } }
        
        .search-wrapper { position: relative; flex: 1; }
        .search-wrapper .material-symbols-rounded { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 20px; }
        .search-input { width: 100%; padding: 12px 12px 12px 44px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); font-size: 14px; outline: none; transition: var(--transition); }
        .search-input:focus { border-color: var(--border-focus); }
        
        .filter-group { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .select-custom { padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); font-size: 14px; font-weight: 500; outline: none; cursor: pointer; color: var(--text-muted); }

        /* ==========================================================================
           PRODUCT & CATEGORY CARDS GRAPHICS
           ========================================================================== */
        .items-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
        @media(min-width: 768px) { .items-grid { grid-template-columns: repeat(2, 1fr); } }
        @media(min-width: 1024px) { .items-grid { grid-template-columns: repeat(3, 1fr); } }

        .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; position: relative; box-shadow: var(--shadow-sm); transition: var(--transition); display: flex; flex-direction: column; justify-content: space-between; }
        .product-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .category-tag { font-size: 11px; font-weight: 700; text-transform: uppercase; tracking: 0.5px; background: var(--primary-light); color: var(--primary); padding: 4px 8px; border-radius: 4px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-dot.active { background: var(--success); }
        .status-dot.inactive { background: var(--danger); }
        
        .product-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
        .product-meta { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; display: flex; gap: 12px; }
        
        .price-structure { background: var(--bg); padding: 12px; border-radius: var(--radius-sm); margin-bottom: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .price-block { display: flex; flex-direction: column; }
        .price-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
        .price-value { font-size: 15px; font-weight: 700; }
        
        .card-actions { display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid var(--border); padding-top: 14px; }
        .btn-icon { background: none; border: none; width: 36px; height: 36px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); transition: var(--transition); border: 1px solid var(--border); }
        .btn-icon:hover { background: var(--bg); color: var(--text); }
        .btn-icon.delete:hover { background: var(--danger-light); color: var(--danger); }

        /* Category Card Layout */
        .category-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; align-items: center; justify-content: space-between; }
        .category-info { display: flex; align-items: center; gap: 16px; }
        .category-avatar { width: 44px; height: 44px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: white; }

        /* ==========================================================================
           DATA HUB / EXPORT FOOTER BAR
           ========================================================================== */
        .data-hub-bar { background: var(--surface); border-top: 1px solid var(--border); padding: 16px; position: fixed; bottom: 0; left: 0; width: 100%; display: flex; justify-content: center; gap: 8px; overflow-x: auto; z-index: 900; }
        .btn-secondary { background: var(--surface); border: 1px solid var(--border); padding: 10px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: var(--transition); }
        .btn-secondary:hover { background: var(--bg); }

        /* ==========================================================================
           MODAL SYSTEM STRUCTURE (Micro-animations Layer)
           ========================================================================== */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .modal-wrapper { background: var(--surface); width: 100%; max-width: 540px; border-radius: var(--radius) var(--radius) 0 0; padding: 24px; max-height: 85vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.2s ease; }
        .modal-overlay.active .modal-wrapper { transform: translateY(0); }
        @media(min-width: 768px) { .modal-overlay { align-items: center; } .modal-wrapper { border-radius: var(--radius); transform: scale(0.95); } .modal-overlay.active .modal-wrapper { transform: scale(1); } }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { font-size: 18px; font-weight: 700; }
        
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        
        .form-label { font-size: 12px; font-weight: 600; color: var(--text-muted); }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 11px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); font-size: 14px; outline: none; transition: var(--transition); }
        .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--border-focus); background: var(--surface); }
        .form-textarea { resize: vertical; min-height: 60px; }
        
        .form-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; border-top: 1px solid var(--border); padding-top: 16px; }
        
        /* Floating Action Button (FAB) */
        .fab-btn { position: fixed; bottom: 84px; right: 20px; background: var(--primary); color: white; border: none; padding: 14px 24px; border-radius: 30px; font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; cursor: pointer; box-shadow: var(--shadow-lg); z-index: 850; transition: var(--transition); }
        .fab-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        .btn-submit { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-inline-add { display: flex; align-items: center; justify-content: center; background: var(--primary-light); color: var(--primary); border: none; padding: 8px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; cursor: pointer; gap: 4px; margin-top: 4px; }

        /* ==========================================================================
           PRINT ARCHITECTURE BLUEPRINT
           ========================================================================== */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <!-- Header Panel -->
        <header class="header-panel">
            <div class="brand">
                <h1>Painel Administrativo</h1>
                <p>Tintas Qualy Quimy — Gestão Estrutural e Arquitetura de Dados</p>
            </div>
        </header>

        <!-- Tabs Switcher Navigation -->
        <nav class="nav-tabs">
            <button class="tab-btn active" id="tab-products" onclick="AdminHub.switchTab('products')">Produtos</button>
            <button class="tab-btn" id="tab-categories" onclick="AdminHub.switchTab('categories')">Categorias</button>
        </nav>

        <!-- Analytics Dashboard Row -->
        <section class="kpi-grid">
            <div class="kpi-card"><div class="kpi-label">Categorias</div><div class="kpi-value" id="kpi-cats">0</div></div>
            <div class="kpi-card"><div class="kpi-label">Total Produtos</div><div class="kpi-value" id="kpi-prods">0</div></div>
            <div class="kpi-card"><div class="kpi-label">Ativos</div><div class="kpi-value" id="kpi-active" style="color:var(--success);">0</div></div>
            <div class="kpi-card"><div class="kpi-label">Preço Médio</div><div class="kpi-value" id="kpi-avg">R$ 0,00</div></div>
        </section>

        <!-- View Segment: Products Main Studio -->
        <div id="view-products">
            <div class="controls-row">
                <div class="search-wrapper">
                    <span class="material-symbols-rounded">search</span>
                    <input type="text" class="search-input" id="searchBar" placeholder="Pesquisar por nome, marca, código ou categoria..." oninput="AdminHub.render()">
                </div>
                <div class="filter-group">
                    <select class="select-custom" id="filterCat" onchange="AdminHub.render()"><option value="">Todas Categorias</option></select>
                    <select class="select-custom" id="filterStatus" onchange="AdminHub.render()">
                        <option value="">Todos Status</option>
                        <option value="Ativo">Ativos</option>
                        <option value="Inativo">Inativos</option>
                    </select>
                    <select class="select-custom" id="filterAtacado" onchange="AdminHub.render()">
                        <option value="">Atacado/Varejo</option>
                        <option value="com">Com Atacado</option>
                        <option value="sem">Sem Atacado</option>
                    </select>
                    <select class="select-custom" id="sortBy" onchange="AdminHub.render()">
                        <option value="recent">Mais Recentes</option>
                        <option value="name">Nome (A-Z)</option>
                        <option value="price-asc">Menor Preço</option>
                        <option value="price-desc">Maior Preço</option>
                    </select>
                </div>
            </div>
            <div class="items-grid" id="productsContainer"></div>
        </div>

        <!-- View Segment: Categories Management -->
        <div id="view-categories" style="display: none;">
            <div style="margin-bottom: 16px; display: flex; justify-content: flex-end;">
                <button class="btn-secondary" style="background:var(--primary); color:white;" onclick="AdminHub.openCategoryModal()">
                    <span class="material-symbols-rounded">add</span> Nova Categoria
                </button>
            </div>
            <div class="items-grid" id="categoriesContainer"></div>
        </div>
    </div>

    <!-- Data Hub / Export Control Deck Bar -->
    <footer class="data-hub-bar no-print">
        <button class="btn-secondary" onclick="DataBridge.exportJSON()"><span class="material-symbols-rounded">download</span> Exportar JSON</button>
        <button class="btn-secondary" onclick="document.getElementById('importFile').click()"><span class="material-symbols-rounded">upload</span> Importar JSON</button>
        <button class="btn-secondary" onclick="DataBridge.exportExcelStub()"><span class="material-symbols-rounded">table_chart</span> Excel (Prep)</button>
        <button class="btn-secondary" onclick="DataBridge.printReport()"><span class="material-symbols-rounded">print</span> Gerar PDF</button>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="DataBridge.importJSON(event)">
    </footer>

    <!-- Floating Action Button -->
    <button class="fab-btn no-print" onclick="AdminHub.openProductModal()">
        <span class="material-symbols-rounded">add</span>
        <span>Novo Produto</span>
    </button>

    <!-- ==========================================================================
       MODAL: PRODUCT CADASTRE & MUTATION LAYER
       ========================================================================== */ -->
    <div class="modal-overlay" id="productModal">
        <div class="modal-wrapper">
            <div class="modal-header">
                <h3 id="prodModalTitle">Novo Produto</h3>
                <button class="btn-icon" onclick="AdminHub.closeModal('productModal')"><span class="material-symbols-rounded">close</span></button>
            </div>
            <form id="productForm" onsubmit="AdminHub.saveProduct(event)">
                <input type="hidden" id="prod-id">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Categoria *</label>
                        <select class="form-select" id="prod-category" required></select>
                        <button type="button" class="btn-inline-add" onclick="AdminHub.openCategoryModal()"><span class="material-symbols-rounded">add</span> Criar Nova Categoria</button>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nome do Produto *</label>
                        <input type="text" class="form-input" id="prod-name" placeholder="Ex: Tinta Acrílica Premium Branco 18L" required>
                    </div>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label class="form-label">Marca *</label>
                            <input type="text" class="form-input" id="prod-brand" placeholder="Ex: Qualy Quimy" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Código Interno</label>
                            <input type="text" class="form-input" id="prod-code" placeholder="Ex: TQP-01">
                        </div>
                    </div>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label class="form-label">Unidade *</label>
                            <select class="form-select" id="prod-unit" required>
                                <option value="Litros">Litros</option>
                                <option value="Quilos">Quilos</option>
                                <option value="Unidade">Unidade</option>
                                <option value="Caixa">Caixa</option>
                                <option value="Galão">Galão</option>
                                <option value="Pacote">Pacote</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Rendimento</label>
                            <input type="text" class="form-input" id="prod-yield" placeholder="Ex: Até 320 m²">
                        </div>
                    </div>
                    <div class="form-row-3">
                        <div class="form-group">
                            <label class="form-label">Preço Venda (R$) *</label>
                            <input type="number" step="0.01" class="form-input" id="prod-price" placeholder="0.00" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Preço Atacado (R$)</label>
                            <input type="number" step="0.01" class="form-input" id="prod-wholesale" placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Mín. Atacado (Un)</label>
                            <input type="number" class="form-input" id="prod-min-wholesale" placeholder="3">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Situação</label>
                        <select class="form-select" id="prod-status">
                            <option value="Ativo">Ativo</option>
                            <option value="Inativo">Inativo</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Descrição</label>
                        <textarea class="form-textarea" id="prod-desc" placeholder="Detalhes adicionais do produto..."></textarea>
                    </div>

                    <!-- HIDDEN INTELLIGENT ROUTING STRUCTURE DIRECTIVES (Pronto para o Motor de Recomendação) -->
                    <input type="hidden" id="ai-subcat" value="">
                    <input type="hidden" id="ai-app-area" value="Ambas"> <!-- Interna, Externa, Ambas -->
                    <input type="hidden" id="ai-env-type" value="Ambos">  <!-- Seco, Úmido, Ambos -->
                    <input type="hidden" id="ai-color-type" value="Ambas"> <!-- Branca, Colorida, Ambas -->
                    <input type="hidden" id="ai-surface" value="">
                    <input type="hidden" id="ai-finish" value="">
                    <input type="hidden" id="ai-priority" value="1">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="AdminHub.closeModal('productModal')">Cancelar</button>
                    <button type="submit" class="btn-submit">Salvar Produto</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ==========================================================================
       MODAL: CATEGORY CREATION HUB
       ========================================================================== */ -->
    <div class="modal-overlay" id="categoryModal">
        <div class="modal-wrapper">
            <div class="modal-header">
                <h3 id="catModalTitle">Nova Categoria</h3>
                <button class="btn-icon" onclick="AdminHub.closeModal('categoryModal')"><span class="material-symbols-rounded">close</span></button>
            </div>
            <form id="categoryForm" onsubmit="AdminHub.saveCategory(event)">
                <input type="hidden" id="cat-id">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Nome da Categoria *</label>
                        <input type="text" class="form-input" id="cat-name" placeholder="Ex: Impermeabilizantes" required>
                    </div>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label class="form-label">Ícone (Emoji/Texto) *</label>
                            <input type="text" class="form-input" id="cat-icon" placeholder="Ex: 🛡️" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Cor de Destaque (Hex) *</label>
                            <input type="color" class="form-input" id="cat-color" value="#0F52BA" style="height:43px; padding:4px;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Descrição</label>
                        <textarea class="form-textarea" id="cat-desc" placeholder="Finalidade desta categoria..."></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="AdminHub.closeModal('categoryModal')">Cancelar</button>
                    <button type="submit" class="btn-submit">Salvar Categoria</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Clean Target Native Print Canvas Node Container -->
    <div id="print-area"></div>

    <!-- ==========================================================================
       JAVASCRIPT ARCHITECTURAL SYSTEM ENGINE (ES6+ MODULES PATTERN)
       ========================================================================== */ -->
    <script>
        /**
         * INITIAL DATA BLUEPRINT MATRIX
         */
        const DefaultCategories = [
            { id: "cat-1", name: "Tintas", icon: "🎨", color: "#0F52BA", desc: "Tintas imobiliárias premium e padrão." },
            { id: "cat-2", name: "Massas", icon: "🧱", color: "#FF6B00", desc: "Massas niveladoras para preparação de superfícies." },
            { id: "cat-3", name: "Texturas", icon: "🏠", color: "#00B159", desc: "Texturas decorativas, rústicas e efeitos." },
            { id: "cat-4", name: "Selantes", icon: "🛡️", color: "#7928CA", desc: "Selantes acrílicos, PU e vedação estrutural." }
        ];

        const DefaultProducts = [
            { id: "prod-1", categoryId: "cat-1", name: "Tinta Acrílica Premium Branco 18L", brand: "Qualy Quimy", code: "TQP-01", unit: "Litros", yield: "Atje 320 m²", price: 289.90, wholesale: 265.00, minWholesale: 5, status: "Ativo", desc: "Alta cobertura e super lavável.", ai: { area: "Interna", environment: "Ambos", color: "Branca", priority: 1 } },
            { id: "prod-2", categoryId: "cat-2", name: "Massa Corrida PVA Interior 25kg", brand: "Qualy Quimy", code: "MPVA-02", unit: "Quilos", yield: "Até 50 m²", price: 65.00, wholesale: 58.00, minWholesale: 10, status: "Ativo", desc: "Fácil de lixar, acabamento liso.", ai: { area: "Interna", environment: "Seco", color: "Branca", priority: 1 } }
        ];

        /**
         * CORE STATE ENGINE MANAGEMENT (LocalStorage Controller Hub)
         */
        const StorageController = {
            init() {
                if (!localStorage.getItem("qq_categories")) localStorage.setItem("qq_categories", JSON.stringify(DefaultCategories));
                if (!localStorage.getItem("qq_products")) localStorage.setItem("qq_products", JSON.stringify(DefaultProducts));
            },
            get(key) { return JSON.parse(localStorage.getItem(`qq_${key}`)); },
            set(key, data) { localStorage.setItem(`qq_${key}`, JSON.stringify(data)); AdminHub.calculateKPIs(); }
        };

        /**
         * REUSABLE COMPONENT FACTORY INTERFACES
         */
        const ComponentFactory = {
            createProductCard(prod, catName) {
                return `
                    <div class="product-card">
                        <div>
                            <div class="card-header">
                                <span class="category-tag">${catName}</span>
                                <div class="status-dot ${prod.status === 'Ativo' ? 'active' : 'inactive'}" title="${prod.status}"></div>
                            </div>
                            <h4 class="product-name">${prod.name}</h4>
                            <div class="product-meta">
                                <span><b>Marca:</b> ${prod.brand}</span>
                                ${prod.code ? `<span><b>Cód:</b> ${prod.code}</span>` : ''}
                            </div>
                            <div class="price-structure">
                                <div class="price-block">
                                    <span class="price-label">Venda</span>
                                    <span class="price-value" style="color:var(--primary)">R$ ${parseFloat(prod.price).toFixed(2)}</span>
                                </div>
                                <div class="price-block">
                                    <span class="price-label">Atacado (${prod.minWholesale || 3} un)</span>
                                    <span class="price-value" style="color:var(--success)">${prod.wholesale ? `R$ ${parseFloat(prod.wholesale).toFixed(2)}` : '—'}</span>
                                </div>
                            </div>
                        </div>
                        <div class="card-actions no-print">
                            <button class="btn-icon" onclick="AdminHub.editProduct('${prod.id}')" title="Editar"><span class="material-symbols-rounded">edit</span></button>
                            <button class="btn-icon" onclick="AdminHub.duplicateProduct('${prod.id}')" title="Duplicar"><span class="material-symbols-rounded">content_copy</span></button>
                            <button class="btn-icon delete" onclick="AdminHub.deleteProduct('${prod.id}')" title="Excluir"><span class="material-symbols-rounded">delete</span></button>
                        </div>
                    </div>
                `;
            },
            createCategoryCard(cat, count) {
                return `
                    <div class="category-card">
                        <div class="category-info">
                            <div class="category-avatar" style="background-color:${cat.color}">${cat.icon}</div>
                            <div>
                                <h4 class="product-name">${cat.name}</h4>
                                <span class="price-label" style="font-weight:600;">${count} produtos atrelados</span>
                            </div>
                        </div>
                        <div class="card-actions no-print">
                            <button class="btn-icon" onclick="AdminHub.editCategory('${cat.id}')"><span class="material-symbols-rounded">edit</span></button>
                            <button class="btn-icon delete" onclick="AdminHub.deleteCategory('${cat.id}')"><span class="material-symbols-rounded">delete</span></button>
                        </div>
                    </div>
                `;
            }
        };

        /**
         * ADMIN MAIN RUNTIME HUB CONTROL SYSTEM
         */
        const AdminHub = {
            activeTab: 'products',

            init() {
                StorageController.init();
                this.populateCategorySelects();
                this.calculateKPIs();
                this.render();
            },

            switchTab(tab) {
                this.activeTab = tab;
                document.getElementById('tab-products').classList.toggle('active', tab === 'products');
                document.getElementById('tab-categories').classList.toggle('active', tab === 'categories');
                document.getElementById('view-products').style.display = tab === 'products' ? 'block' : 'none';
                document.getElementById('view-categories').style.display = tab === 'categories' ? 'block' : 'none';
                this.render();
            },

            calculateKPIs() {
                const prods = StorageController.get('products');
                const cats = StorageController.get('categories');
                
                document.getElementById('kpi-cats').innerText = cats.length;
                document.getElementById('kpi-prods').innerText = prods.length;
                document.getElementById('kpi-active').innerText = prods.filter(p => p.status === 'Ativo').length;
                
                const avgPrice = prods.length ? prods.reduce((acc, p) => acc + parseFloat(p.price), 0) / prods.length : 0;
                document.getElementById('kpi-avg').innerText = `R$ ${avgPrice.toFixed(2)}`;
            },

            populateCategorySelects() {
                const cats = StorageController.get('categories');
                const filterSelect = document.getElementById('filterCat');
                const formSelect = document.getElementById('prod-category');
                
                let options = `<option value="">Todas Categorias</option>`;
                let formOptions = `<option value="" disabled selected>Selecione a Categoria</option>`;
                
                cats.forEach(c => {
                    options += `<option value="${c.id}">${c.name}</option>`;
                    formOptions += `<option value="${c.id}">${c.name}</option>`;
                });
                
                filterSelect.innerHTML = options;
                formSelect.innerHTML = formOptions;
            },

            render() {
                if (this.activeTab === 'products') this.renderProducts();
                else this.renderCategories();
            },

            renderProducts() {
                const prods = StorageController.get('products');
                const cats = StorageController.get('categories');
                const container = document.getElementById('productsContainer');
                
                // Fetch Filters Inputs
                const query = document.getElementById('searchBar').value.toLowerCase();
                const filterCat = document.getElementById('filterCat').value;
                const filterStatus = document.getElementById('filterStatus').value;
                const filterAtacado = document.getElementById('filterAtacado').value;
                const sortBy = document.getElementById('sortBy').value;

                let filtered = prods.filter(p => {
                    const catObj = cats.find(c => c.id === p.categoryId);
                    const catName = catObj ? catObj.name.toLowerCase() : '';
                    const matchesSearch = p.name.toLowerCase().includes(query) || p.brand.toLowerCase().includes(query) || (p.code && p.code.toLowerCase().includes(query)) || catName.includes(query);
                    const matchesCat = filterCat === "" || p.categoryId === filterCat;
                    const matchesStatus = filterStatus === "" || p.status === filterStatus;
                    const matchesAtacado = filterAtacado === "" || (filterAtacado === "com" ? !!p.wholesale : !p.wholesale);
                    
                    return matchesSearch && matchesCat && matchesStatus && matchesAtacado;
                });

                // Ordering Matrix Architecture
                if (sortBy === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));
                else if (sortBy === 'price-asc') filtered.sort((a,b) => a.price - b.price);
                else if (sortBy === 'price-desc') filtered.sort((a,b) => b.price - a.price);
                else filtered.sort((a,b) => b.id.localeCompare(a.id)); // Default: Recentes

                container.innerHTML = filtered.length ? filtered.map(p => {
                    const cat = cats.find(c => c.id === p.categoryId);
                    return ComponentFactory.createProductCard(p, cat ? cat.name : 'Sem Cat');
                }).join('') : `<p style="grid-column: 1/-1; text-align:center; color:var(--text-muted); padding:40px;">Nenhum produto localizado com estes parâmetros.</p>`;
            },

            renderCategories() {
                const prods = StorageController.get('products');
                const cats = StorageController.get('categories');
                const container = document.getElementById('categoriesContainer');

                container.innerHTML = cats.map(c => {
                    const count = prods.filter(p => p.categoryId === c.id).length;
                    return ComponentFactory.createCategoryCard(c, count);
                }).join('');
            },

            /* Modal Actions Controllers */
            openProductModal(id = null) {
                document.getElementById('productForm').reset();
                document.getElementById('prod-id').value = '';
                document.getElementById('prodModalTitle').innerText = 'Novo Produto';
                
                if (id) {
                    const p = StorageController.get('products').find(prod => prod.id === id);
                    if (p) {
                        document.getElementById('prod-id').value = p.id;
                        document.getElementById('prod-category').value = p.categoryId;
                        document.getElementById('prod-name').value = p.name;
                        document.getElementById('prod-brand').value = p.brand;
                        document.getElementById('prod-code').value = p.code || '';
                        document.getElementById('prod-unit').value = p.unit;
                        document.getElementById('prod-yield').value = p.yield || '';
                        document.getElementById('prod-price').value = p.price;
                        document.getElementById('prod-wholesale').value = p.wholesale || '';
                        document.getElementById('prod-min-wholesale').value = p.minWholesale || '';
                        document.getElementById('prod-status').value = p.status;
                        document.getElementById('prod-desc').value = p.desc || '';
                        document.getElementById('prodModalTitle').innerText = 'Editar Produto';
                    }
                }
                document.getElementById('productModal').classList.add('active');
            },

            openCategoryModal(id = null) {
                document.getElementById('categoryForm').reset();
                document.getElementById('cat-id').value = '';
                document.getElementById('catModalTitle').innerText = 'Nova Categoria';
                if (id) {
                    const c = StorageController.get('categories').find(cat => cat.id === id);
                    if (c) {
                        document.getElementById('cat-id').value = c.id;
                        document.getElementById('cat-name').value = c.name;
                        document.getElementById('cat-icon').value = c.icon;
                        document.getElementById('cat-color').value = c.color;
                        document.getElementById('cat-desc').value = c.desc || '';
                        document.getElementById('catModalTitle').innerText = 'Editar Categoria';
                    }
                }
                document.getElementById('categoryModal').classList.add('active');
            },

            closeModal(modalId) { document.getElementById(modalId).classList.remove('active'); },

            saveProduct(e) {
                e.preventDefault();
                const products = StorageController.get('products');
                const id = document.getElementById('prod-id').value || `prod-${Date.now()}`;
                
                const data = {
                    id,
                    categoryId: document.getElementById('prod-category').value,
                    name: document.getElementById('prod-name').value,
                    brand: document.getElementById('prod-brand').value,
                    code: document.getElementById('prod-code').value,
                    unit: document.getElementById('prod-unit').value,
                    yield: document.getElementById('prod-yield').value,
                    price: parseFloat(document.getElementById('prod-price').value),
                    wholesale: document.getElementById('prod-wholesale').value ? parseFloat(document.getElementById('prod-wholesale').value) : null,
                    minWholesale: document.getElementById('prod-min-wholesale').value ? parseInt(document.getElementById('prod-min-wholesale').value) : null,
                    status: document.getElementById('prod-status').value,
                    desc: document.getElementById('prod-desc').value,
                    // Parâmetros Relacionais Estruturais Ocultos para Recomendação Inteligente Avançada
                    ai: {
                        subcat: document.getElementById('ai-subcat').value,
                        area: document.getElementById('ai-app-area').value,
                        environment: document.getElementById('ai-env-type').value,
                        colorType: document.getElementById('ai-color-type').value,
                        surface: document.getElementById('ai-surface').value,
                        finish: document.getElementById('ai-finish').value,
                        priority: parseInt(document.getElementById('ai-priority').value || 1)
                    }
                };

                const index = products.findIndex(p => p.id === id);
                if (index > -1) products[index] = data; else products.unshift(data);

                StorageController.set('products', products);
                this.closeModal('productModal');
                this.render();
            },

            saveCategory(e) {
                e.preventDefault();
                const categories = StorageController.get('categories');
                const id = document.getElementById('cat-id').value || `cat-${Date.now()}`;
                
                const data = {
                    id,
                    name: document.getElementById('cat-name').value,
                    icon: document.getElementById('cat-icon').value,
                    color: document.getElementById('cat-color').value,
                    desc: document.getElementById('cat-desc').value
                };

                const index = categories.findIndex(c => c.id === id);
                if (index > -1) categories[index] = data; else categories.push(data);

                StorageController.set('categories', categories);
                this.populateCategorySelects();
                this.closeModal('categoryModal');
                this.render();
            },

            editProduct(id) { this.openProductModal(id); },
            editCategory(id) { this.openCategoryModal(id); },

            duplicateProduct(id) {
                const products = StorageController.get('products');
                const target = products.find(p => p.id === id);
                if (target) {
                    const cloned = { ...target, id: `prod-${Date.now()}`, name: `${target.name} (Cópia)` };
                    products.unshift(cloned);
                    StorageController.set('products', products);
                    this.render();
                }
            },

            deleteProduct(id) {
                if(confirm("Confirmar exclusão deste produto?")) {
                    const products = StorageController.get('products').filter(p => p.id !== id);
                    StorageController.set('products', products);
                    this.render();
                }
            },

            deleteCategory(id) {
                const prods = StorageController.get('products');
                if (prods.some(p => p.categoryId === id)) {
                    alert("Aviso: Não é possível remover categorias vinculadas a produtos ativos.");
                    return;
                }
                if(confirm("Deseja prosseguir com a remoção desta categoria?")) {
                    const categories = StorageController.get('categories').filter(c => c.id !== id);
                    StorageController.set('categories', categories);
                    this.populateCategorySelects();
                    this.render();
                }
            }
        };

        /**
         * DATA BRIDGE PIPELINE INTERACTION (Export/Import IO Framework Core)
         */
        const DataBridge = {
            exportJSON() {
                const data = { products: StorageController.get('products'), categories: StorageController.get('categories') };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `backup_qualyquimy_${Date.now()}.json`;
                a.click();
            },

            importJSON(e) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (parsed.products && parsed.categories) {
                            localStorage.setItem("qq_products", JSON.stringify(parsed.products));
                            localStorage.setItem("qq_categories", JSON.stringify(parsed.categories));
                            alert("Base de dados sincronizada com sucesso!");
                            AdminHub.init();
                        } else { alert("Formato estrutural inválido."); }
                    } catch(err) { alert("Erro ao interpretar arquivo de dados."); }
                };
                reader.readAsText(e.target.files[0]);
            },

            exportExcelStub() {
                alert("Arquitetura estruturada para download de planilha XLS: os dados seriam enviados ao endpoint corporativo formatados em CSV estruturado.");
            },

            printReport() {
                const prods = StorageController.get('products');
                const cats = StorageController.get('categories');
                
                let html = `
                    <div style="padding: 30px; font-family: sans-serif;">
                        <h2 style="color:#0F52BA; margin-bottom: 5px;">Relatório Geral de Produtos — Tintas Qualy Quimy</h2>
                        <p style="font-size:12px; color:#666; margin-bottom:25px;">Emitido em: ${new Date().toLocaleDateString('pt-BR')} ${new Date().toLocaleTimeString('pt-BR')}</p>
                        <table style="width:100%; border-collapse:collapse; font-size:12px;">
                            <thead>
                                <tr style="background:#F0F6FF; text-align:left;">
                                    <th style="padding:10px; border:1px solid #ddd;">Código</th>
                                    <th style="padding:10px; border:1px solid #ddd;">Produto</th>
                                    <th style="padding:10px; border:1px solid #ddd;">Categoria</th>
                                    <th style="padding:10px; border:1px solid #ddd;">Marca</th>
                                    <th style="padding:10px; border:1px solid #ddd;">Preço Venda</th>
                                    <th style="padding:10px; border:1px solid #ddd;">Status</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                prods.forEach(p => {
                    const cat = cats.find(c => c.id === p.categoryId);
                    html += `
                        <tr>
                            <td style="padding:8px; border:1px solid #ddd;">${p.code || '—'}</td>
                            <td style="padding:8px; border:1px solid #ddd;"><b>${p.name}</b></td>
                            <td style="padding:8px; border:1px solid #ddd;">${cat ? cat.name : '—'}</td>
                            <td style="padding:8px; border:1px solid #ddd;">${p.brand}</td>
                            <td style="padding:8px; border:1px solid #ddd;">R$ ${parseFloat(p.price).toFixed(2)}</td>
                            <td style="padding:8px; border:1px solid #ddd;">${p.status}</td>
                        </tr>
                    `;
                });

                html += `</tbody></table></div>`;
                
                const canvas = document.getElementById('print-area');
                canvas.innerHTML = html;
                window.print();
            }
        };

        // Initialize Runtime Engine
        window.addEventListener('DOMContentLoaded', () => AdminHub.init());
    </script>
</body>
</html>
