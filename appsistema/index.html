<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Produtos e Categorias - Qualy Quimy</title>
    <!-- Ícones e Fontes Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --border-focus: #2563eb;
            --text: #0f172a;
            --text-muted: #64748b;
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --success: #16a34a;
            --success-light: #f0fdf4;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 30px 15px; }

        .container { max-width: 1100px; margin: 0 auto; }
        
        header { margin-bottom: 30px; border-bottom: 2px solid var(--border); padding-bottom: 15px; }
        header h1 { font-size: 24px; font-weight: 700; color: var(--text); }
        header p { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

        /* Grid Principal: Form do lado esquerdo, Lista do direito */
        .main-grid { display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media(min-width: 768px) { .main-grid { grid-template-columns: 380px 1fr; } }

        /* Estilo dos Cards/Painéis */
        .panel { background: var(--surface); padding: 24px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); height: fit-content; }
        .panel h2 { font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

        /* Formulários */
        .form-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        label { font-size: 13px; font-weight: 600; color: var(--text); }
        input, select, textarea { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; outline: none; background: #fafafa; transition: all 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary-focus); background: var(--surface); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        textarea { resize: vertical; min-height: 70px; }
        
        button { background: var(--primary); color: white; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:hover { background: #1d4ed8; }

        /* Lista de Produtos */
        .products-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
        @media(min-width: 992px) { .products-grid { grid-template-columns: 1fr 1fr; } }

        .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        
        .card-header { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
        .tag-cat { font-size: 11px; font-weight: 700; background: var(--primary-light); color: var(--primary); padding: 4px 8px; border-radius: 4px; text-transform: uppercase; }
        .tag-sub { font-size: 11px; font-weight: 700; background: #f1f5f9; color: #475569; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; }
        
        .product-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
        .product-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }
        
        .price-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f8fafc; padding: 12px; border-radius: 8px; }
        .price-box { display: flex; flex-direction: column; }
        .price-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
        .price-val { font-size: 15px; font-weight: 700; }

        .btn-delete { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #ef4444; width: auto; padding: 4px; cursor: pointer; border-radius: 4px; }
        .btn-delete:hover { background: #ffeeec; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Painel Geral de Produtos</h1>
        <p>Gerencie Tintas, Massas, Texturas e Selantes com controle flexível de subcategorias e valores.</p>
    </header>

    <div class="main-grid">
        <!-- Formulário de Cadastro (Esquerda) -->
        <div class="panel">
            <h2><span class="material-symbols-rounded">add_box</span> Novo Produto</h2>
            <form id="productForm" onsubmit="adicionarProduto(event)">
                
                <div class="form-group">
                    <label for="prodCategory">Categoria Principal *</label>
                    <select id="prodCategory" onchange="atualizarSubcategoriasForm()" required>
                        <option value="Tintas">Tintas</option>
                        <option value="Massa PVA ou Acrílica">Massa PVA ou Acrílica</option>
                        <option value="Texturas">Texturas</option>
                        <option value="Selantes">Selantes</option>
                    </select>
                </div>

                <!-- Subcategoria dinâmica ou opcional -->
                <div class="form-group">
                    <label for="prodSubcategory">Subcategoria (Opcional)</label>
                    <select id="prodSubcategory">
                        <!-- Alimentado via JavaScript baseado na seleção acima -->
                    </select>
                </div>

                <div class="form-group">
                    <label for="prodName">Nome do Produto *</label>
                    <input type="text" id="prodName" placeholder="Ex: Tinta Acrílica Fosca Branco 18L" required>
                </div>

                <div class="form-group">
                    <label for="prodDesc">Descrição</label>
                    <textarea id="prodDesc" placeholder="Detalhes técnicos, rendimento ou aplicação..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="prodPrice">Preço Unidade (R$) *</label>
                        <input type="number" step="0.01" id="prodPrice" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label for="prodWholesale">Preço Atacado (R$) *</label>
                        <input type="number" step="0.01" id="prodWholesale" placeholder="0.00" required>
                    </div>
                </div>

                <button type="submit"><span class="material-symbols-rounded">save</span> Salvar Produto</button>
            </form>
        </div>

        <!-- Grade de Visualização dos Produtos (Direita) -->
        <div>
            <div class="panel" style="margin-bottom: 20px; padding: 15px 20px;">
                <div style="display:flex; justify-content: space-between; align-items:center;">
                    <strong id="contador-produtos">0 Produtos Cadastrados</strong>
                    <span style="font-size:12px; color:var(--text-muted)">Filtro automático ativo</span>
                </div>
            </div>

            <div class="products-grid" id="productsContainer">
                <!-- Produtos renderizados aqui via JS -->
            </div>
        </div>
    </div>
</div>

<script>
    // Mapeamento das subcategorias sugeridas por padrão para cada uma das 4 categorias solicitadas
    const mapeamentoSubcategorias = {
        "Tintas": ["Econômica", "Standard", "Premium", "Super Premium"],
        "Massa PVA ou Acrílica": ["PVA (Interior)", "Acrílica (Exterior)"],
        "Texturas": ["Geral", "Rústico", "Grafiato"], // Se não precisar de sub, o usuário usa "Geral" ou deixa vazio
        "Selantes": ["Acrílico", "Poliuretano (PU)", "Silicone"]
    };

    // Banco de dados em memória simulado (Inicia com alguns exemplos preenchidos)
    let produtosLista = [
        {
            id: 1,
            categoria: "Tintas",
            subcategoria: "Premium",
            nome: "Tinta Acrílica Premium Fosca Gelo 18L",
            descricao: "Alta cobertura, excelente rendimento e lavável. Indicado para ambientes internos e externos.",
            preco: 329.90,
            atacado: 299.00
        },
        {
            id: 2,
            categoria: "Massa PVA ou Acrílica",
            subcategoria: "PVA (Interior)",
            nome: "Massa Corrida PVA Balde 25kg",
            descricao: "Ideal para nivelar e corrigir imperfeições rasas em paredes internas de alvenaria ou gesso.",
            preco: 79.00,
            atacado: 69.90
        },
        {
            id: 3,
            categoria: "Texturas",
            subcategoria: "", // Exemplo direto (sem subcategoria ativa exposta)
            nome: "Textura Quartzo Rústico Envelhecido 25kg",
            descricao: "Pronto para uso. Hidrorepelente com excelente acabamento estético riscado.",
            preco: 115.00,
            atacado: 98.00
        }
    ];

    // Atualiza o select de subcategorias no formulário dependendo de qual das 4 categorias foi clicada
    function atualizarSubcategoriasForm() {
        const categoriaSelecionada = document.getElementById("prodCategory").value;
        const selectSub = document.getElementById("prodSubcategory");
        
        // Limpa opções antigas
        selectSub.innerHTML = "";

        // Sempre adiciona uma opção vazia/direta caso não precise de subcategoria
        const optVazia = document.createElement("option");
        optVazia.value = "";
        optVazia.text = "Direto na categoria (Sem subcategoria)";
        selectSub.appendChild(optVazia);

        // Busca a lista de subs mapeadas
        const subs = mapeamentoSubcategorias[categoriaSelecionada] || [];
        subs.forEach(sub => {
            const opt = document.createElement("option");
            opt.value = sub;
            opt.text = sub;
            selectSub.appendChild(opt);
        });
    }

    // Função para renderizar os cartões na tela no mesmo estilo moderno solicitado
    function renderizarProdutos() {
        const container = document.getElementById("productsContainer");
        const contador = document.getElementById("contador-produtos");
        
        container.innerHTML = "";
        contador.innerText = `${produtosLista.length} Produto(s) Cadastrado(s)`;

        if(produtosLista.length === 0) {
            container.innerHTML = `<p style="color:var(--text-muted); text-align:center; padding:30px; grid-column: 1/-1;">Nenhum produto cadastrado até o momento.</p>`;
            return;
        }

        produtosLista.forEach(prod => {
            const card = document.createElement("div");
            card.className = "product-card";
            
            // Renderiza as tags (Se não tiver subcategoria, renderiza apenas a principal)
            let tagsHTML = `<span class="tag-cat">${prod.categoria}</span>`;
            if(prod.subcategoria && prod.subcategoria !== "Geral") {
                tagsHTML += `<span class="tag-sub">${prod.subcategoria}</span>`;
            }

            card.innerHTML = `
                <button class="btn-delete" onclick="removerProduto(${prod.id})" title="Excluir produto">
                    <span class="material-symbols-rounded">delete</span>
                </button>
                <div>
                    <div class="card-header">
                        ${tagsHTML}
                    </div>
                    <h3 class="product-title">${prod.nome}</h3>
                    <p class="product-desc">${prod.descricao || '<i>Sem descrição preenchida.</i>'}</p>
                </div>
                <div class="price-container">
                    <div class="price-box">
                        <span class="price-label">Preço Unidade</span>
                        <span class="price-val" style="color: var(--primary)">R$ ${parseFloat(prod.preco).toFixed(2)}</span>
                    </div>
                    <div class="price-box">
                        <span class="price-label">Preço Atacado</span>
                        <span class="price-val" style="color: var(--success)">R$ ${parseFloat(prod.atacado).toFixed(2)}</span>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Acionando o salvamento de um novo produto
    function adicionarProduto(event) {
        event.preventDefault();

        const novoProd = {
            id: Date.now(),
            categoria: document.getElementById("prodCategory").value,
            subcategoria: document.getElementById("prodSubcategory").value,
            nome: document.getElementById("prodName").value,
            descricao: document.getElementById("prodDesc").value,
            preco: parseFloat(document.getElementById("prodPrice").value),
            atacado: parseFloat(document.getElementById("prodWholesale").value)
        };

        produtosLista.unshift(novoProd); // Adiciona no início da lista
        document.getElementById("productForm").reset();
        atualizarSubcategoriasForm(); // Reseta as opções do sub-select
        renderizarProdutos();
    }

    // Remover item do array
    function removerProduto(id) {
        if(confirm("Tem certeza que deseja remover este produto do catálogo?")) {
            produtosLista = produtosLista.filter(p => p.id !== id);
            renderizarProdutos();
        }
    }

    // Inicialização ao carregar a página
    window.addEventListener("DOMContentLoaded", () => {
        atualizarSubcategoriasForm();
        renderizarProdutos();
    });
</script>

</body>
</html>
