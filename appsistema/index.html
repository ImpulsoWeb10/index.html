<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Consultor Inteligente - Tintas Qualy Quimy</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        /* ==========================================================================
           VARIABLES & DESIGN SYSTEM (Premium Palette)
           ========================================================================== */
        :root {
            --primary: #0F52BA;        /* Azul Confiança Comercial */
            --primary-light: #EBF3FF;
            --accent: #FF6B00;         /* Laranja Energia/Pintura */
            --text-main: #1A202C;
            --text-muted: #718096;
            --bg-app: #F7FAFC;
            --surface: #FFFFFF;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --shadow-premium: 0 20px 40px -15px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.02);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ==========================================================================
           MAIN SCREEN LAYOUT
           ========================================================================== */
        .app-container {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            padding: 24px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: var(--radius-lg);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 38px;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(15, 82, 186, 0.2);
            margin-bottom: 20px;
        }

        .brand-name {
            font-size: 26px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .brand-slogan {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 600;
        }

        .welcome-card {
            background: var(--surface);
            padding: 28px 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-premium);
            text-align: center;
            margin-bottom: 32px;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .welcome-card h1 {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.4;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .welcome-card p {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* Category Grid */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .category-card {
            background: var(--surface);
            border: 2px solid transparent;
            border-radius: var(--radius-md);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-premium);
            transition: var(--transition);
            position: relative;
        }

        .category-card:active, .category-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary-light);
            box-shadow: 0 15px 30px rgba(15, 82, 186, 0.08);
        }

        .category-icon {
            font-size: 32px;
            margin-bottom: 12px;
            transition: var(--transition);
        }

        .category-card:hover .category-icon {
            transform: scale(1.15);
        }

        .category-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
        }

        /* ==========================================================================
           MODAL SYSTEM (Fade + Scale Performance Layer)
           ========================================================================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 17, 40, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: flex-end; /* Mobile bottom sheet look, morphs to center on desktop */
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-wrapper {
            background: var(--surface);
            width: 100%;
            max-width: 480px;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            padding: 24px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
            transform: translateY(100%) scale(1);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 92vh;
            display: flex;
            flex-direction: column;
        }

        .modal-overlay.active .modal-wrapper {
            transform: translateY(0) scale(1);
        }

        /* Desktop Adjustment */
        @media(min-width: 480px) {
            .modal-overlay {
                align-items: center;
            }
            .modal-wrapper {
                border-radius: var(--radius-lg);
                transform: translateY(20px) scale(0.95);
            }
            .modal-overlay.active .modal-wrapper {
                transform: translateY(0) scale(1);
            }
        }

        /* Modal Top Header Elements */
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .nav-btn {
            background: var(--primary-light);
            border: none;
            color: var(--primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .nav-btn:hover {
            background: var(--primary);
            color: white;
        }

        .step-indicator {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
            background: var(--primary-light);
            padding: 6px 14px;
            border-radius: 20px;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background: var(--primary-light);
            border-radius: 3px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        /* Dynamic Content Area */
        .modal-body {
            overflow-y: auto;
            flex: 1;
            padding-bottom: 16px;
        }

        .question-title {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 24px;
            color: var(--text-main);
        }

        /* Input Controls */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-button {
            background: var(--surface);
            border: 2px solid #E2E8F0;
            border-radius: var(--radius-md);
            padding: 18px 20px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            text-align: left;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .option-button:hover, .option-button:active {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }

        .option-button::after {
            content: '\e5cc';
            font-family: 'Material Symbols Rounded';
            font-size: 20px;
            color: var(--text-muted);
            opacity: 0.5;
        }

        .input-numeric-wrapper {
            position: relative;
            margin-top: 10px;
        }

        .input-numeric {
            width: 100%;
            padding: 18px;
            border: 2px solid #E2E8F0;
            border-radius: var(--radius-md);
            font-size: 18px;
            font-weight: 600;
            outline: none;
            transition: var(--transition);
        }

        .input-numeric:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(15, 82, 186, 0.15);
        }

        .input-unit {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-weight: 700;
            color: var(--text-muted);
        }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(15, 82, 186, 0.2);
            transition: var(--transition);
        }

        .submit-btn:hover {
            background: #0d46a0;
        }

        /* ==========================================================================
           SUMMARY / RESULT SCREEN
           ========================================================================== */
        .summary-card {
            background: #FAFAFA;
            border-radius: var(--radius-md);
            padding: 20px;
            border: 1px dashed #CBD5E0;
            margin-bottom: 24px;
        }

        .summary-header-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 16px;
            font-weight: 700;
            text-align: center;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #EDF2F7;
            font-size: 15px;
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .summary-label {
            color: var(--text-muted);
            font-weight: 500;
        }

        .summary-value {
            color: var(--text-main);
            font-weight: 600;
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: var(--transition);
        }

        .btn-pdf { background: #E2E8F0; color: var(--text-main); }
        .btn-pdf:hover { background: #CBD5E0; }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-whatsapp:hover { background: #20ba5a; }
        .btn-restart { background: var(--primary-light); color: var(--primary); }
        .btn-restart:hover { background: var(--primary); color: white; }
        .btn-home { background: transparent; border: 1px solid #E2E8F0; color: var(--text-muted); }
        .btn-home:hover { background: #F7FAFC; }

        /* ==========================================================================
           PRINT ENGINE ARCHITECTURE (Native High Fidelity PDF Blueprint)
           ========================================================================== */
        @media print {
            body * {
                visibility: hidden;
            }
            #print-zone, #print-zone * {
                visibility: visible;
            }
            #print-zone {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                background: white;
                color: black;
                padding: 40px;
            }
            .no-print {
                display: none !important;
            }
        }

        /* Dynamic Hidden Print Zone Construction Container */
        #print-zone {
            display: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header Principal -->
        <header class="brand-header">
            <div class="brand-logo">
                <span class="material-symbols-rounded">palette</span>
            </div>
            <h2 class="brand-name">Tintas Qualy Quimy</h2>
            <p class="brand-slogan">Há 18 anos com você.</p>
        </header>

        <!-- Welcome Dashboard Segment -->
        <main class="welcome-card">
            <h1>Olá! Seja bem-vindo à Tintas Qualy Quimy.</h1>
            <p>Há 18 anos ajudando clientes a encontrar a solução ideal para pintura e acabamento. Vamos descobrir o produto ideal para sua obra?</p>
        </main>

        <!-- Category Hub Selection Matrix -->
        <section class="category-grid">
            <div class="category-card" onclick="ConsultorEngine.initSession('tintas')">
                <span class="category-icon">🎨</span>
                <span class="category-title">Tintas</span>
            </div>
            <div class="category-card" onclick="ConsultorEngine.initSession('massas')">
                <span class="category-icon">🧱</span>
                <span class="category-title">Massas</span>
            </div>
            <div class="category-card" onclick="ConsultorEngine.initSession('texturas')">
                <span class="category-icon">🏠</span>
                <span class="category-title">Texturas</span>
            </div>
            <div class="category-card" onclick="ConsultorEngine.initSession('selantes')">
                <span class="category-icon">🛡</span>
                <span class="category-title">Selantes</span>
            </div>
        </section>
    </div>

    <!-- ==========================================================================
       MODAL CORE CONTAINER TEMPLATE
       ========================================================================== -->
    <div class="modal-overlay" id="consultorModal">
        <div class="modal-wrapper">
            <div class="modal-header">
                <button class="nav-btn" id="modalBackBtn" onclick="ConsultorEngine.backStep()">
                    <span class="material-symbols-rounded">arrow_back</span>
                </button>
                <div class="step-indicator" id="modalStepIndicator">Etapa 1 de 7</div>
                <button class="nav-btn" onclick="ConsultorEngine.closeModal()">
                    <span class="material-symbols-rounded">close</span>
                </button>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="modalProgressBar"></div>
            </div>

            <div class="modal-body" id="modalDynamicContent">
                <!-- Injected Form Fields / Controls Stream Generates Here -->
            </div>
        </div>
    </div>

    <!-- Hidden Printable Structural Matrix Zone -->
    <div id="print-zone"></div>

    <!-- ==========================================================================
       JAVASCRIPT MODERN ARCHITECTURE CORE ENGINE (ES6+)
       ========================================================================== */
    <script>
        /**
         * CONFIGURAÇÃO DOS FLUXOS (Simulação Estrutural de Arquivos JSON de Categoria)
         * Arquitetura preparada para acoplamento dinâmico e expansões assíncronas.
         */
        const ModulosPerguntas = {
            tintas: {
                titulo: "Tintas",
                perguntas: [
                    { id: "aplicacao", texto: "Onde será aplicada?", tipo: "select", opcoes: ["Área Interna", "Área Externa"] },
                    { id: "acabamento", texto: "Qual acabamento deseja?", tipo: "select", opcoes: ["Branca", "Colorida"] },
                    { id: "parede", texto: "A parede é:", tipo: "select", opcoes: ["Nova", "Já Pintada"] },
                    { id: "umidade", texto: "Existe umidade?", tipo: "select", opcoes: ["Sim", "Não"] },
                    { id: "cor_atual", texto: "Qual a cor atual da parede?", tipo: "select", opcoes: ["Clara", "Média", "Escura"] },
                    { id: "metragem", texto: "Quantos metros quadrados serão pintados?", tipo: "number", sulfixo: "m²" },
                    { id: "demaos", texto: "Quantas demãos pretende aplicar?", tipo: "select", opcoes: ["2", "3", "Ainda não sei"] }
                ]
            },
            massas: {
                titulo: "Massas",
                perguntas: [
                    { id: "massa_tipo", texto: "Qual massa procura?", tipo: "select", opcoes: ["Massa PVA", "Massa Acrílica"] },
                    { id: "umidade", texto: "Existe umidade?", tipo: "select", opcoes: ["Sim", "Não"] },
                    { id: "aplicacao_local", texto: "Aplicação:", tipo: "select", opcoes: ["Parede", "Teto"] },
                    { id: "ambiente", texto: "Área Interna ou Externa?", tipo: "select", opcoes: ["Interna", "Externa"] },
                    { id: "metragem", texto: "Quantos metros quadrados?", tipo: "number", sulfixo: "m²" }
                ]
            },
            texturas: {
                titulo: "Texturas",
                perguntas: [
                    { id: "ambiente", texto: "Área Interna ou Externa?", tipo: "select", opcoes: ["Interna", "Externa"] },
                    { id: "metragem", texto: "Quantos metros quadrados?", tipo: "number", sulfixo: "m²" }
                ]
            },
            selantes: {
                titulo: "Selantes",
                perguntas: [
                    { id: "tipo_superficie", texto: "Qual a superfície de aplicação?", tipo: "select", opcoes: ["Calhas/Rufos", "Vidros/Alumínio", "Alvenaria", "Madeira"] },
                    { id: "metragem", texto: "Quantos metros lineares ou m²?", tipo: "number", sulfixo: "un/m²" }
                ]
            }
        };

        /**
         * ENGINE DO CONSULTOR INTELIGENTE (Singleton Pattern Controller)
         */
        const ConsultorEngine = {
            currentCategory: null,
            currentStep: 0,
            answers: {},

            initSession(categoria) {
                this.currentCategory = categoria;
                this.currentStep = 0;
                this.answers = {};
                
                document.getElementById('consultorModal').classList.add('active');
                this.renderStep();
            },

            closeModal() {
                document.getElementById('consultorModal').classList.remove('active');
            },

            getModule() {
                return ModulosPerguntas[this.currentCategory];
            },

            renderStep() {
                const modulo = this.getModule();
                const totalPerguntas = modulo.perguntas.length;
                const wrapper = document.getElementById('modalDynamicContent');
                const backBtn = document.getElementById('modalBackBtn');
                
                // Controle do Botão Voltar
                backBtn.style.visibility = this.currentStep === 0 ? 'hidden' : 'visible';

                // Se superou o número de perguntas, renderiza tela final de resultados
                if (this.currentStep >= totalPerguntas) {
                    this.renderSummary();
                    return;
                }

                const pergunta = modulo.perguntas[this.currentStep];
                
                // Atualização dos Indicadores de Estado de Progresso e Etapa
                document.getElementById('modalStepIndicator').innerText = `Etapa ${this.currentStep + 1} de ${totalPerguntas}`;
                const porcentagemProgresso = ((this.currentStep) / totalPerguntas) * 100;
                document.getElementById('modalProgressBar').style.width = `${porcentagemProgresso}%`;

                // Construção Dinâmica de Interface do Formulário
                let html = `<h3 class="question-title">${pergunta.texto}</h3>`;

                if (pergunta.tipo === 'select') {
                    html += `<div class="options-list">`;
                    pergunta.opcoes.forEach(opcao => {
                        html += `
                            <button class="option-button" onclick="ConsultorEngine.saveAnswer('${pergunta.id}', '${opcao}')">
                                ${opcao}
                            </button>
                        `;
                    });
                    html += `</div>`;
                } else if (pergunta.tipo === 'number') {
                    html += `
                        <div class="input-numeric-wrapper">
                            <input type="number" inputmode="numeric" pattern="[0-9]*" id="numericField" class="input-numeric" placeholder="Digite o valor">
                            <span class="input-unit">${pergunta.sulfixo || ''}</span>
                        </div>
                        <button class="submit-btn" onclick="ConsultorEngine.saveNumericAnswer('${pergunta.id}')">Continuar</button>
                    `;
                }

                wrapper.innerHTML = html;
                
                // Auto-focus para melhorar UX no celular abrindo teclado direto se for numérico
                const inputNum = document.getElementById('numericField');
                if(inputNum) inputNum.focus();
            },

            saveAnswer(key, value) {
                this.answers[key] = value;
                this.currentStep++;
                this.renderStep();
            },

            saveNumericAnswer(key) {
                const input = document.getElementById('numericField');
                if (!input || input.value.trim() === "") {
                    alert("Por favor, insira um valor válido para prosseguir.");
                    return;
                }
                this.saveAnswer(key, input.value + (this.getModule().perguntas[this.currentStep].sulfixo || ''));
            },

            backStep() {
                if (this.currentStep > 0) {
                    this.currentStep--;
                    this.renderStep();
                }
            },

            /**
             * RENDERIZAÇÃO DA TELA DE RESUMO FINAL
             */
            renderSummary() {
                // Atualiza barra para 100% no sucesso do encerramento do fluxo
                document.getElementById('modalProgressBar').style.width = `100%`;
                document.getElementById('modalStepIndicator').innerText = `Concluído`;
                
                // Persistência local segura em LocalStorage corporativo
                localStorage.setItem(`qualyquimy_atendimento_${Date.now()}`, JSON.stringify({
                    categoria: this.currentCategory,
                    dados: this.answers,
                    timestamp: new Date().toISOString()
                }));

                const modulo = this.getModule();
                const wrapper = document.getElementById('modalDynamicContent');

                let html = `
                    <h3 class="question-title" style="text-align:center;">✨ Seu Diagnóstico Está Pronto!</h3>
                    <div class="summary-card">
                        <div class="summary-header-title">Resumo do Atendimento</div>
                        <div class="summary-item">
                            <span class="summary-label">Categoria:</span>
                            <span class="summary-value">${modulo.titulo}</span>
                        </div>
                `;

                // Mapeia chaves com rótulos amigáveis legíveis humanos
                modulo.perguntas.forEach(p => {
                    html += `
                        <div class="summary-item">
                            <span class="summary-label">${p.texto.replace('?','').replace(':','')}:</span>
                            <span class="summary-value">${this.answers[p.id]}</span>
                        </div>
                    `;
                });

                html += `
                    </div>
                    <div class="action-grid">
                        <button class="btn-action btn-pdf" onclick="ConsultorEngine.generatePDF()">
                            <span class="material-symbols-rounded">picture_as_pdf</span> Gerar PDF
                        </button>
                        <button class="btn-action btn-whatsapp" onclick="ConsultorEngine.sendWhatsApp()">
                            <span class="material-symbols-rounded">chat</span> WhatsApp
                        </button>
                    </div>
                    <button class="btn-action btn-restart" style="width:100%; margin-bottom:8px;" onclick="ConsultorEngine.initSession('${this.currentCategory}')">
                        <span class="material-symbols-rounded">refresh</span> Recomeçar
                    </button>
                    <button class="btn-action btn-home" style="width:100%;" onclick="ConsultorEngine.closeModal()">
                        <span class="material-symbols-rounded">home</span> Voltar ao início
                    </button>
                `;

                wrapper.innerHTML = html;
            },

            /**
             * SISTEMA DE MONTAGEM E ENVIO VIA TELEFONIA WHATSAPP
             */
            sendWhatsApp() {
                const modulo = this.getModule();
                let textoZap = `Olá!\nGostaria de um orçamento.\nSegue meu atendimento.\n\n`;
                textoZap += `*Categoria:* ${modulo.titulo}\n`;
                
                modulo.perguntas.forEach(p => {
                    textoZap += `*${p.texto.replace('?','').replace(':','')}:* ${this.answers[p.id]}\n`;
                });
                
                textoZap += `\nAguardar o vendedor indicar os produtos ideais.`;
