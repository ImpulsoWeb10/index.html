<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Qualy Quimy — Pedidos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<!-- TIPOGRAFIA: Inter (corpo) + Poppins (títulos) -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════
   VARIÁVEIS GLOBAIS
════════════════════════════════════════════════ */
:root {
  --bg: #0d0d11;
  --surface: #18181f;
  --surface2: #20202a;
  --border: #2a2a38;
  --accent: #f5c542;
  --green: #2ecc71;
  --red: #ff4d6d;
  --blue: #4f8ef7;
  --text: #f0f0f5;
  --muted: #6b6b88;
  --radius: 18px;
  --radius-sm: 11px;
  /* Tipografia */
  --font-title: 'Poppins', sans-serif;
  --font-body:  'Inter', sans-serif;
  --font-mono:  'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
}

/* ════════════════════════════════════════════════
   TELA INÍCIO
════════════════════════════════════════════════ */
#tela-inicio {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100dvh; padding: 32px 22px;
  background:
    radial-gradient(ellipse at 20% 10%, #2a1f5e55 0%, transparent 55%),
    radial-gradient(ellipse at 85% 85%, #5c2a0e44 0%, transparent 55%),
    var(--bg);
}

.logo-wrap { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
.logo-box {
  width: 60px; height: 60px; background: var(--accent);
  border-radius: 16px; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-title); font-weight: 800; font-size: 24px; color: #0d0d11;
  box-shadow: 0 0 36px #f5c54244;
}
.logo-text { font-family: var(--font-title); font-weight: 800; font-size: 28px; letter-spacing: -0.5px; }
.logo-text span { color: var(--accent); }

.app-sub { color: var(--muted); font-size: 13px; margin-bottom: 36px; }

.form-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 26px 24px;
  width: 100%; max-width: 420px;
}

.field-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--muted); margin-bottom: 7px;
}

.field-input {
  width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 15px;
  color: var(--text); font-family: var(--font-body); font-size: 15px;
  outline: none; transition: border-color .2s; margin-bottom: 16px;
}
.field-input:focus { border-color: var(--accent); }
.field-input::placeholder { color: var(--muted); }

.btn-start {
  width: 100%; background: var(--accent); color: #0d0d11;
  border: none; border-radius: var(--radius-sm); padding: 15px;
  font-family: var(--font-title); font-weight: 700; font-size: 15px;
  cursor: pointer; letter-spacing: 0.3px; transition: opacity .2s, transform .1s;
}
.btn-start:active { transform: scale(.98); }

/* ════════════════════════════════════════════════
   APP PRINCIPAL
════════════════════════════════════════════════ */
#app { display: none; flex-direction: column; min-height: 100dvh; }

/* Header */
.header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 13px 16px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.hdr-vendedor { font-family: var(--font-title); font-weight: 700; font-size: 14px; }
.hdr-cliente { font-size: 11px; color: var(--muted); margin-top: 1px; }
.hdr-right { display: flex; gap: 8px; align-items: center; }

.total-pill {
  background: var(--accent); color: #0d0d11; border-radius: 8px;
  padding: 6px 11px; font-family: var(--font-title); font-weight: 700; font-size: 13px;
  cursor: pointer; display: none;
}
.cart-btn {
  position: relative; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px;
}
.cart-badge {
  position: absolute; top: -6px; right: -6px;
  background: var(--accent); color: #0d0d11; border-radius: 50%;
  width: 19px; height: 19px; font-size: 10px; font-weight: 700;
  display: none; align-items: center; justify-content: center;
  font-family: var(--font-title);
}
.cart-badge.show { display: flex; }

/* Search */
.search-wrap {
  padding: 12px 16px 4px;
  position: sticky; top: 69px; z-index: 90; background: var(--bg);
}
.search-row { position: relative; }
.search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 15px; pointer-events: none;
}
.search-input {
  width: 100%; background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 50px; padding: 10px 16px 10px 40px;
  color: var(--text); font-family: var(--font-body); font-size: 14px; outline: none;
  transition: border-color .2s;
}
.search-input:focus { border-color: var(--accent); }

/* Chips categoria */
.cats-scroll {
  display: flex; gap: 8px; overflow-x: auto;
  padding: 10px 16px 6px; scrollbar-width: none;
}
.cats-scroll::-webkit-scrollbar { display: none; }
.cat-chip {
  flex-shrink: 0; display: flex; align-items: center; gap: 6px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 50px; padding: 7px 14px;
  font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; white-space: nowrap;
}
.cat-chip.active { background: var(--accent); border-color: var(--accent); color: #0d0d11; }
.cat-chip .chip-icon { font-size: 14px; }

/* Lista de produtos */
.products-list {
  display: flex; flex-direction: column; gap: 6px;
  padding: 6px 16px 160px;
}
.prod-row {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 13px 15px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: all .18s; position: relative; overflow: hidden;
}
.prod-row::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--accent);
  transform: scaleY(0); transform-origin: center; transition: transform .2s;
}
.prod-row.in-cart { border-color: #f5c54233; }
.prod-row.in-cart::before { transform: scaleY(1); }
.prod-row:active { transform: scale(.99); background: var(--surface2); }

.prod-cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.prod-info { flex: 1; min-width: 0; }
.prod-nome {
  font-size: 13px; font-weight: 600;
  white-space: normal; overflow: visible; text-overflow: unset;
  line-height: 1.4; word-break: break-word;
}
.prod-cat-tag { font-size: 10px; color: var(--muted); margin-top: 2px; }
.prod-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.prod-preco { font-family: var(--font-title); font-weight: 700; font-size: 14px; color: var(--accent); }
.qty-mini {
  background: var(--accent); color: #0d0d11; border-radius: 6px;
  padding: 2px 8px; font-family: var(--font-title); font-weight: 700; font-size: 11px; display: none;
}
.qty-mini.show { display: block; }

/* ════════════════════════════════════════════════
   BOTÃO FECHAR PEDIDO (NOVO — fixo na base)
════════════════════════════════════════════════ */
.btn-fechar-pedido {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
  background: linear-gradient(135deg, #f5c542, #f0a500);
  color: #0d0d11; border: none; border-radius: 50px;
  padding: 16px 40px;
  font-family: var(--font-title); font-weight: 700; font-size: 15px;
  letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; display: none; align-items: center; gap: 10px;
  box-shadow: 0 8px 32px rgba(245, 197, 66, 0.45);
  z-index: 150; transition: all .25s; white-space: nowrap;
  min-width: 220px; justify-content: center;
}
.btn-fechar-pedido.show { display: flex; }
.btn-fechar-pedido:active { transform: translateX(-50%) scale(.97); }
.btn-fechar-pedido .bfp-icon { font-size: 18px; }

/* FAB carrinho (fica acima do btn fechar) */
.fab {
  position: fixed; bottom: 88px; right: 18px;
  background: var(--surface); color: var(--text); border: 1.5px solid var(--border);
  border-radius: 50px; padding: 10px 16px;
  font-family: var(--font-title); font-weight: 700; font-size: 13px;
  cursor: pointer; display: none; align-items: center; gap: 7px;
  z-index: 150; transition: all .2s;
}
.fab.show { display: flex; }
.fab:active { transform: scale(.97); }

/* ════════════════════════════════════════════════
   OVERLAYS E DRAWERS
════════════════════════════════════════════════ */
.overlay {
  position: fixed; inset: 0; background: #000a;
  z-index: 200; opacity: 0; pointer-events: none; transition: opacity .3s;
}
.overlay.open { opacity: 1; pointer-events: all; }

.drawer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-radius: 22px 22px 0 0;
  z-index: 201; transform: translateY(100%);
  transition: transform .35s cubic-bezier(.32,.72,0,1);
  max-height: 88dvh; display: flex; flex-direction: column;
}
.drawer.open { transform: translateY(0); }
.drawer-handle {
  width: 38px; height: 4px; background: var(--border);
  border-radius: 2px; margin: 12px auto 0; flex-shrink: 0;
}
.drawer-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.drawer-title { font-family: var(--font-title); font-weight: 700; font-size: 16px; }
.btn-zerar {
  background: none; border: 1px solid var(--red); border-radius: 8px;
  color: var(--red); font-size: 11px; font-weight: 700; padding: 4px 11px; cursor: pointer;
}
.btn-back {
  background: none; border: 1px solid var(--muted); border-radius: 8px;
  color: var(--muted); font-size: 11px; font-weight: 700; padding: 4px 11px; cursor: pointer;
}
.drawer-body { overflow-y: auto; flex: 1; }

/* Itens carrinho */
.cart-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 18px; border-bottom: 1px solid #ffffff0a;
}
.ci-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ci-info { flex: 1; min-width: 0; }
.ci-nome { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ci-unit { font-size: 10px; color: var(--muted); margin-top: 2px; }
.qty-ctrl {
  display: flex; align-items: center;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; overflow: hidden;
}
.qty-btn {
  background: none; border: none; color: var(--text);
  font-size: 17px; width: 34px; height: 34px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.qty-btn:active { background: var(--border); }
.qty-num { font-family: var(--font-title); font-weight: 700; font-size: 14px; min-width: 28px; text-align: center; }
.ci-total { font-family: var(--font-title); font-weight: 700; font-size: 13px; color: var(--accent); min-width: 62px; text-align: right; }

.cart-empty { text-align: center; padding: 48px 24px; color: var(--muted); }
.cart-empty-icon { font-size: 44px; margin-bottom: 10px; }

.drawer-foot { border-top: 1px solid var(--border); padding: 14px 18px; flex-shrink: 0; }
.total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.total-lbl { font-size: 13px; color: var(--muted); }
.total-val { font-family: var(--font-title); font-weight: 800; font-size: 22px; color: var(--accent); }

.btn-pagar {
  width: 100%; background: var(--green); color: #0d0d11; border: none;
  border-radius: var(--radius-sm); padding: 14px;
  font-family: var(--font-title); font-weight: 700; font-size: 14px;
  cursor: pointer; transition: opacity .2s;
}
.btn-pagar:active { opacity: .85; }

/* ════════════════════════════════════════════════
   PAGAMENTO
════════════════════════════════════════════════ */
.pgto-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px 18px; }
.pgto-opt {
  background: var(--surface2); border: 2px solid var(--border);
  border-radius: var(--radius-sm); padding: 16px 10px; text-align: center; cursor: pointer; transition: all .2s;
}
.pgto-opt.sel { border-color: var(--accent); background: #f5c54210; }
.pgto-opt:active { transform: scale(.97); }
.pgto-icon { font-size: 22px; margin-bottom: 5px; }
.pgto-lbl { font-size: 12px; font-weight: 700; }
.pgto-desc { font-size: 10px; color: var(--green); margin-top: 3px; }
.pgto-desc.neutral { color: var(--muted); }

.parc-wrap { padding: 0 18px 14px; }
.parc-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 9px; }
.parc-opt {
  background: var(--surface2); border: 2px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 15px;
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; transition: all .2s; margin-bottom: 8px;
}
.parc-opt.sel { border-color: var(--accent); background: #f5c54210; }
.parc-opt-lbl { font-size: 13px; font-weight: 600; }
.parc-opt-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
.parc-opt-val { font-family: var(--font-title); font-weight: 700; font-size: 14px; color: var(--accent); }

.resumo-box {
  margin: 0 18px 14px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px 16px;
}
.resumo-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 7px; color: var(--muted); }
.resumo-row.final {
  margin-bottom: 0; padding-top: 10px; border-top: 1px solid var(--border);
  font-size: 15px; font-weight: 700; color: var(--text);
}
.resumo-row span:last-child { font-family: var(--font-title); font-weight: 700; }

.action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 18px 20px; }
.btn-whats {
  background: #25d366; color: #fff; border: none; border-radius: var(--radius-sm);
  padding: 14px; font-family: var(--font-title); font-weight: 700; font-size: 13px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-pdf {
  background: var(--surface2); color: var(--text); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px;
  font-family: var(--font-title); font-weight: 700; font-size: 13px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
}

/* Toast */
.toast {
  position: fixed; bottom: 22px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: var(--text); color: var(--bg);
  border-radius: 50px; padding: 9px 18px; font-size: 12px; font-weight: 600;
  z-index: 999; transition: transform .3s; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

#print-area { display: none; }
@media print { body > *:not(#print-area) { display: none !important; } #print-area { display: block !important; } }

/* Cat colors */
.c-tintas   { background: #4f8ef7; }
.c-massas   { background: #2ecc71; }
.c-texturas { background: #f39c12; }
.c-selantes { background: #9b59b6; }
.c-compl    { background: #e74c3c; }

@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.prod-row { animation: fadeUp .25s ease both; }

/* ════════════════════════════════════════════════
   MODAL PRODUTO (com input numérico)
════════════════════════════════════════════════ */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px;
  opacity: 0; pointer-events: none; transition: opacity .3s ease;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }

.modal-card {
  background: #ffffff; border-radius: 24px;
  width: 100%; max-width: 380px; padding: 28px 24px 24px;
  position: relative;
  transform: scale(.88) translateY(20px); opacity: 0;
  transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .3s ease;
  box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 8px 24px rgba(0,0,0,0.3);
}
.modal-backdrop.open .modal-card { transform: scale(1) translateY(0); opacity: 1; }

.modal-close {
  position: absolute; top: 14px; right: 14px;
  width: 32px; height: 32px; border-radius: 50%;
  background: #f0f0f5; border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; color: #555; transition: background .2s, transform .15s;
}
.modal-close:active { transform: scale(.9); background: #e0e0ec; }

.modal-nome {
  font-family: var(--font-title); font-weight: 700; font-size: 16px;
  color: #0d0d1f; text-align: center; line-height: 1.4;
  margin-top: 4px; margin-bottom: 20px; padding: 0 10px;
  word-break: break-word; white-space: normal;
}

/* Controle qty com input */
.modal-qty-wrap { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 18px; }

.modal-qty-btn {
  width: 52px; height: 52px; border-radius: 14px; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 300; transition: transform .15s, box-shadow .15s; flex-shrink: 0;
}
.modal-qty-btn:active { transform: scale(.92); }
.modal-qty-btn.minus { background: #eef1f8; color: #333; }
.modal-qty-btn.minus:active { background: #e0e4f0; }
.modal-qty-btn.plus { background: #4f8ef7; color: #fff; box-shadow: 0 6px 20px #4f8ef755; }
.modal-qty-btn.plus:active { background: #3a7be0; box-shadow: none; }

/* INPUT numérico editável */
.modal-qty-input {
  font-family: var(--font-title); font-weight: 800; font-size: 28px;
  color: #0d0d1f; text-align: center;
  width: 72px; border: 2px solid #e0e4f0; border-radius: 12px;
  padding: 8px 6px; outline: none; background: #f8faff;
  transition: border-color .2s;
  -moz-appearance: textfield;
}
.modal-qty-input::-webkit-outer-spin-button,
.modal-qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.modal-qty-input:focus { border-color: #4f8ef7; }

.modal-preco-box {
  background: #f0f4ff; border-radius: 14px;
  padding: 14px 20px; text-align: center; margin-bottom: 18px;
}
.modal-preco {
  font-family: var(--font-title); font-weight: 800; font-size: 28px;
  color: #4f8ef7; font-style: italic; letter-spacing: -0.5px;
}

.modal-btn-adicionar {
  width: 100%; background: #0d0d1f; color: #fff; border: none;
  border-radius: 50px; padding: 16px;
  font-family: var(--font-title); font-weight: 700; font-size: 14px;
  letter-spacing: 1.5px; text-transform: uppercase;
  cursor: pointer; transition: opacity .2s, transform .15s; margin-bottom: 10px;
}
.modal-btn-adicionar:active { transform: scale(.98); opacity: .9; }

.modal-btn-voltar {
  width: 100%; background: transparent; color: #999; border: none;
  border-radius: 50px; padding: 10px;
  font-family: var(--font-body); font-weight: 600; font-size: 13px;
  letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; transition: color .2s;
}
.modal-btn-voltar:active { color: #555; }

/* Campo de cor */
.modal-cor-wrap {
  margin-bottom: 18px;
}
.modal-cor-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; color: #999; margin-bottom: 7px; display: block;
}
.modal-cor-input {
  width: 100%; background: #f8faff; border: 2px solid #e0e4f0;
  border-radius: 12px; padding: 13px 15px;
  font-family: var(--font-body); font-size: 15px; color: #0d0d1f;
  outline: none; transition: border-color .2s;
}
.modal-cor-input:focus { border-color: #4f8ef7; }
.modal-cor-input::placeholder { color: #bbb; }

/* ════════════════════════════════════════════════
   TELA DE RESUMO / COMPROVANTE (NOVO)
════════════════════════════════════════════════ */
.resumo-screen {
  position: fixed; inset: 0;
  background: #f5f5f0;
  z-index: 400;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transform: translateY(30px);
  transition: opacity .35s ease, transform .35s cubic-bezier(.32,.72,0,1);
  overflow-y: auto;
}
.resumo-screen.open { opacity: 1; pointer-events: all; transform: translateY(0); }

.resumo-topbar {
  background: #fff; border-bottom: 1px solid #e0e0e0;
  padding: 14px 18px;

.resumo-topbar-close:active { background: #e0e0e0; }

.comprovante-wrap {
  padding: 20px 18px 100px;
  display: flex; flex-direction: column; align-items: center;
}

.comprovante {
  background: #fff;
  width: 100%; max-width: 360px;
  border-radius: 4px;
  padding: 24px 20px;
  font-family: var(--font-mono); font-size: 13px; color: #1a1a2e;

}

/* Bordas dentadas do recibo */
.comprovante::before, .comprovante::after {
  content: '';
  display: block;
  height: 12px;
  background-image: radial-gradient(circle at 6px -3px, transparent 6px, #fff 6px);
  background-size: 12px 12px;
  background-repeat: repeat-x;
  margin: 0 -20px;
  filter: drop-shadow(0 1px 1px rgba(0,0,0,0.05));
}
.comprovante::before { margin-bottom: 16px; transform: rotate(180deg); }
.comprovante::after  { margin-top: 16px; }

.cv-item-row {

.cv-item-nome { flex: 1; color: #222; }

<div id="tela-inicio">

    <div class="logo-box">Q</div>
    <div class="logo-text">Qualy <span>Quimy</span></div>
  </div>

  <div class="form-card">
    <div class="field-label">Seu nome (vendedor)</div>
    <input class="field-input" id="inp-vendedor" placeholder="Ex: João Silva" />

    <div class="field-label">Nome do cliente / loja</div>
    <input class="field-input" id="inp-cliente" placeholder="Ex: Loja das Tintas" />

    <div class="field-label">Data do pedido</div>
    <input class="field-input" id="inp-data" type="date" />

    <button class="btn-start" onclick="iniciar()">Começar pedido →</button>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">
  <div class="header">
    <div class="hdr-left">
      <div class="hdr-vendedor" id="hdr-vend">—</div>
      <div class="hdr-cliente" id="hdr-cli">—</div>
    </div>

        🛒
        <div class="cart-badge" id="cart-badge">0</div>
      </div>
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-row">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search" placeholder="Buscar produto..." oninput="renderProdutos()" />
    </div>
  </div>

  <div class="cats-scroll" id="cats"></div>
  <div class="products-list" id="prod-list"></div>

  <!-- FAB carrinho (compacto) -->
  <button class="fab" id="fab" onclick="abrirCarrinho()">
    🛒 <span id="fab-val">R$ 0,00</span>
  </button>

  <!-- BOTÃO FECHAR PEDIDO (novo) -->

    <span class="bfp-icon">🧾</span> FECHAR PEDIDO
  </button>
</div>

<!-- OVERLAY drawers -->
<div class="overlay" id="overlay" onclick="fecharTudo()"></div>

<!-- DRAWER CARRINHO -->
<div class="drawer" id="drawer-cart">
  <div class="drawer-handle"></div>
  <div class="drawer-head">
    <div class="drawer-title">🛒 Carrinho</div>

    <div class="modal-nome" id="modal-nome">—</div>
    <div class="modal-qty-wrap">
      <button class="modal-qty-btn minus" onclick="modalAlterarQty(-1)">−</button>
      <input
        class="modal-qty-input"
        id="modal-qty-input"
        type="number" min="1" value="1"
        oninput="modalInputChange(this)"
        onblur="modalInputBlur(this)"
      />

    </div>
  </div>

  <div class="resumo-actions">
    <button class="btn-resumo-whats" onclick="enviarWhats()">📲 WhatsApp</button>

</div>

<!-- TOAST -->

// ══════════════════════════════════════════════

  {id:42, cat:'Texturas', nome:'Textura Lisa - Lata 28kg',                    preco:72.90},
  {id:43, cat:'Selantes', nome:'Selador Acrílico - Pote 1L',                  preco:9.50},

  {id:46, cat:'Selantes', nome:'Selador Acrílico - Lata 18L',                 preco:79.90},
  {id:47, cat:'Selantes', nome:'Selador Gesso - Lata 18L',                    preco:110.00},
  {id:48, cat:'Complementos', nome:'Primer - Galão 3.6L',                     preco:49.90},
  {id:49, cat:'Complementos', nome:'Primer - Balde 16L',                      preco:138.00},
  {id:50, cat:'Complementos', nome:'Primer - Lata 18L',                       preco:158.00},
  {id:51, cat:'Complementos', nome:'Impermeabilizante - Galão 3.6L',          preco:49.90},
  {id:52, cat:'Complementos', nome:'Impermeabilizante - Balde 16L',           preco:138.90},
  {id:53, cat:'Complementos', nome:'Impermeabilizante - Lata 18L',            preco:149.90},
  {id:54, cat:'Complementos', nome:'Liquibrilho - Lata 18L',                  preco:280.00},
  {id:55, cat:'Complementos', nome:'Cimento Queimado - Balde 25kg',           preco:188.00},
];

// ══════════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════════
const E = {
  vendedor: '', cliente: '', data: '',
  carrinho: {},
  catAtiva: 'Todos',
  pgto: null, parcelas: null, diasCheque: '',
  numeroPedido: 1,
};

// Estado do modal
let modalProdId = null;
let modalQty = 1;

// ══════════════════════════════════════════════
// INÍCIO
// ══════════════════════════════════════════════
document.getElementById('inp-data').value = new Date().toISOString().split('T')[0];

function iniciar() {
  const v = document.getElementById('inp-vendedor').value.trim();
  const c = document.getElementById('inp-cliente').value.trim();
  const d = document.getElementById('inp-data').value;
  if (!v || !c) { showToast('⚠️ Preencha vendedor e cliente!'); return; }
  E.vendedor = v; E.cliente = c; E.data = d;
  document.getElementById('hdr-vend').textContent = v;
  document.getElementById('hdr-cli').textContent  = '📍 ' + c;
  document.getElementById('tela-inicio').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  renderCats();
  renderProdutos();
}

// ══════════════════════════════════════════════
// CATEGORIAS
// ══════════════════════════════════════════════
function renderCats() {
  const wrap = document.getElementById('cats');
  const chips = [{ nome:'Todos', emoji:'⚡', cls:'' }, ...CATS];
  wrap.innerHTML = chips.map(c => `
    <div class="cat-chip ${c.nome === E.catAtiva ? 'active' : ''}" onclick="selecionarCat('${c.nome}')">
      <span class="chip-icon">${c.emoji}</span>${c.nome}
    </div>`).join('');
}

function selecionarCat(cat) {
  E.catAtiva = cat;
  renderCats();
  renderProdutos();
}

// ══════════════════════════════════════════════
// PRODUTOS
// ══════════════════════════════════════════════
function renderProdutos() {
  const busca = document.getElementById('search').value.toLowerCase();
  let prods = PRODUTOS;
  if (E.catAtiva !== 'Todos') prods = prods.filter(p => p.cat === E.catAtiva);
  if (busca) prods = prods.filter(p => p.nome.toLowerCase().includes(busca));

  document.getElementById('prod-list').innerHTML = prods.map((p, i) => {
    const qty = E.carrinho[p.id] || 0;
    const cls = catCls[p.cat] || '';
    return `
    <div class="prod-row ${qty > 0 ? 'in-cart' : ''}" onclick="abrirModalProduto(${p.id})" style="animation-delay:${i*18}ms">
      <div class="prod-cat-dot ${cls}"></div>
      <div class="prod-info">
        <div class="prod-nome">${p.nome}</div>
        <div class="prod-cat-tag">${p.cat}</div>
      </div>
      <div class="prod-right">
        <div class="prod-preco">R$ ${brl(p.preco)}</div>
        <div class="qty-mini ${qty > 0 ? 'show' : ''}">×${qty}</div>
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════
// MODAL PRODUTO
// ══════════════════════════════════════════════
function abrirModalProduto(id) {
  const p = PRODUTOS.find(x => x.id === id);
  if (!p) return;
  modalProdId = id;
  modalQty = E.carrinho[id] || 1;
  document.getElementById('modal-nome').textContent = p.nome;
  document.getElementById('modal-qty-input').value = modalQty;
  atualizarModalPreco(p);

  // Exibe campo de cor apenas se o nome do produto contém "cor"
  const temCor = /cor/i.test(p.nome);
  const corWrap = document.getElementById('modal-cor-wrap');
  const corInput = document.getElementById('modal-cor-input');
  corWrap.style.display = temCor ? 'block' : 'none';
  corInput.value = E.cores && E.cores[id] ? E.cores[id] : '';

  document.getElementById('modal-produto').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function fecharModal() {
  document.getElementById('modal-produto').classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(() => { modalProdId = null; }, 350);
}

function fecharModalFora(event) {
  if (event.target === document.getElementById('modal-produto')) fecharModal();
}

function modalAlterarQty(delta) {
  const novo = modalQty + delta;
  if (novo < 1) return;
  modalQty = novo;
  document.getElementById('modal-qty-input').value = modalQty;
  const p = PRODUTOS.find(x => x.id === modalProdId);
  atualizarModalPreco(p);
}

// Input manual de quantidade
function modalInputChange(input) {
  const val = parseInt(input.value, 10);
  if (!isNaN(val) && val >= 1) {
    modalQty = val;
    const p = PRODUTOS.find(x => x.id === modalProdId);
    atualizarModalPreco(p);
  }
}

// Validação ao perder foco: garante mínimo 1
function modalInputBlur(input) {
  const val = parseInt(input.value, 10);
  if (isNaN(val) || val < 1) {
    modalQty = 1;
    input.value = 1;
    const p = PRODUTOS.find(x => x.id === modalProdId);
    atualizarModalPreco(p);
  }
}

function atualizarModalPreco(p) {
  document.getElementById('modal-preco').textContent = 'R$ ' + brl(p.preco * modalQty);
}

function adicionarProdutoModal() {
  if (!modalProdId) return;
  const p = PRODUTOS.find(x => x.id === modalProdId);
  E.carrinho[modalProdId] = (E.carrinho[modalProdId] || 0) + modalQty;

  // Salva cor se o campo estiver visível
  const corWrap = document.getElementById('modal-cor-wrap');
  if (corWrap.style.display !== 'none') {
    if (!E.cores) E.cores = {};
    E.cores[modalProdId] = document.getElementById('modal-cor-input').value.trim();
  }

  showToast(`✔ ${p.nome.split(' - ')[0]} ×${E.carrinho[modalProdId]}`);
  atualizarUI();
  fecharModal();
}

// ══════════════════════════════════════════════
// CARRINHO
// ══════════════════════════════════════════════
function calcSubtotal() {
  return Object.entries(E.carrinho).reduce((s, [id, q]) => {
    const p = PRODUTOS.find(x => x.id == id);
    return s + (p ? p.preco * q : 0);
  }, 0);
}

function calcTotal() {
  const sub = calcSubtotal();
  if (E.pgto === 'Pix' || E.pgto === 'Espécie') return sub * 0.97;
  return sub;
}

function qtdTotal() {
  return Object.values(E.carrinho).reduce((s, q) => s + q, 0);
}

function atualizarUI() {
  const sub = calcSubtotal();
  const qty = qtdTotal();

  const badge = document.getElementById('cart-badge');
  badge.textContent = qty;
  badge.classList.toggle('show', qty > 0);

  const pill = document.getElementById('total-pill');
  pill.style.display = qty > 0 ? 'block' : 'none';
  pill.textContent = 'R$ ' + brl(sub);

  const fab = document.getElementById('fab');
  fab.classList.toggle('show', qty > 0);
  document.getElementById('fab-val').textContent = 'R$ ' + brl(sub);

  const btnFechar = document.getElementById('btn-fechar-pedido');
  btnFechar.classList.toggle('show', qty > 0);

  document.getElementById('cart-total').textContent = 'R$ ' + brl(sub);

  renderProdutos();
  renderCartBody();
}

function renderCartBody() {
  const body = document.getElementById('cart-body');
  const itens = Object.entries(E.carrinho).filter(([,q]) => q > 0);

  if (itens.length === 0) {
    body.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛒</div><div style="font-size:13px">Carrinho vazio</div></div>`;
    return;
  }

  body.innerHTML = itens.map(([id, qty]) => {
    const p = PRODUTOS.find(x => x.id == id);
    const cls = catCls[p.cat] || '';
    const cor = E.cores && E.cores[id] ? E.cores[id] : '';
    const corTag = cor ? `<div class="ci-unit" style="color:#f5c542">🎨 ${cor}</div>` : '';
    return `
    <div class="cart-item">
      <div class="ci-dot ${cls}"></div>
      <div class="ci-info">
        <div class="ci-nome">${p.nome}</div>
        <div class="ci-unit">R$ ${brl(p.preco)} / un</div>
        ${corTag}
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="alterarQty(${id},-1)">−</button>
        <div class="qty-num">${qty}</div>
        <button class="qty-btn" onclick="alterarQty(${id},1)">+</button>
      </div>
      <div class="ci-total">R$ ${brl(p.preco * qty)}</div>
    </div>`;
  }).join('');
}

function alterarQty(id, delta) {
  const novo = (E.carrinho[id] || 0) + delta;
  if (novo <= 0) delete E.carrinho[id];
  else E.carrinho[id] = novo;
  atualizarUI();
}

function zerarCarrinho() {
  if (!confirm('Zerar o carrinho?')) return;
  E.carrinho = {}; E.pgto = null; E.parcelas = null;
  atualizarUI(); fecharTudo();
}

// ══════════════════════════════════════════════
// DRAWERS
// ══════════════════════════════════════════════
function abrirCarrinho() {
  renderCartBody();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer-cart').classList.add('open');
}

function abrirPgto() {
  if (qtdTotal() === 0) { showToast('⚠️ Adicione produtos!'); return; }
  E.pgto = null; E.parcelas = null;
  document.getElementById('drawer-cart').classList.remove('open');
  document.getElementById('drawer-pgto').classList.add('open');
  renderPgto();
}

function voltarCart() {
  document.getElementById('drawer-pgto').classList.remove('open');
  document.getElementById('drawer-cart').classList.add('open');
}

function fecharTudo() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer-cart').classList.remove('open');
  document.getElementById('drawer-pgto').classList.remove('open');
}

/** Abre a tela de resumo estilo maquininha */
function abrirResumoPedido() {
  if (qtdTotal() === 0) { showToast('⚠️ Adicione produtos primeiro!'); return; }
  document.getElementById('comprovante-body').innerHTML = gerarResumoHTML();
  document.getElementById('resumo-screen').classList.add('open');
  document.body.style.overflow = 'hidden';
}

/** Fecha a tela de resumo */
function fecharResumoPedido() {
  document.getElementById('resumo-screen').classList.remove('open');
  document.body.style.overflow = '';
}

/** Gera o HTML do comprovante estilo maquininha */
function gerarResumoHTML() {
  const itens = Object.entries(E.carrinho).filter(([,q]) => q > 0);
  const sub    = calcSubtotal();
  const total  = calcTotal();
  const temDesconto = E.pgto === 'Pix' || E.pgto === 'Espécie';
  const dataFmt = E.data
    ? E.data.split('-').reverse().join('/')
    : new Date().toLocaleDateString('pt-BR');
  const hora = new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  const numPedido = String(E.numeroPedido).padStart(6, '0');

  const linhaItens = itens.map(([id, qty]) => {
    const p = PRODUTOS.find(x => x.id == id);
    const cor = E.cores && E.cores[id] ? E.cores[id] : '';
    const corLinha = cor ? `<div style="font-size:11px;color:#f5a500;margin-top:1px">🎨 Cor: ${cor}</div>` : '';
    return `
    <div class="cv-item-row" style="flex-direction:column;align-items:flex-start">
      <div style="display:flex;justify-content:space-between;width:100%">
        <span class="cv-item-nome">${p.nome.split(' - ')[0]} x${qty}</span>
        <span class="cv-item-total">R$${brl(p.preco * qty)}</span>
      </div>
      ${corLinha}
    </div>`;
  }).join('');

  const descontoHTML = temDesconto ? `
    <div class="cv-sub-row desconto">
      <span>Desconto (3%)</span><span>-R$${brl(sub * 0.03)}</span>
    </div>` : '';

  const pgtoLabel = E.pgto ? formatarPgto() : '—';

  return `
    <div class="cv-eq">================================</div>

    <div class="cv-center" style="margin:10px 0 4px">
      <div class="cv-empresa">QUALY QUIMY</div>
      <div class="cv-vendedor">Vendedor: ${E.vendedor}</div>
      <div class="cv-data">${dataFmt} &nbsp; ${hora}</div>
      <div class="cv-pedido">Nº <strong>${numPedido}</strong></div>
    </div>

    <hr class="cv-sep">

    <div class="cv-row"><span class="cv-label">Cliente:</span><span class="cv-val">${E.cliente}</span></div>

    <hr class="cv-sep">

    ${linhaItens}

    <hr class="cv-sep-solid">

    <div class="cv-subtotal-blk">
      <div class="cv-sub-row"><span>Subtotal</span><span>R$${brl(sub)}</span></div>
      ${descontoHTML}
    </div>

    <div class="cv-total-blk">
      <span class="cv-total-lbl">*TOTAL*</span>
      <span class="cv-total-val">R$${brl(total)}</span>
    </div>

    <hr class="cv-sep">
    <div class="cv-pgto">💳 Pgto: <strong>${pgtoLabel}</strong></div>
    <hr class="cv-sep">

    <div class="cv-msg">Obrigado! Volte sempre 😊</div>
    <div class="cv-eq" style="margin-top:10px">================================</div>
  `;
}

/** Gera o texto formatado estilo comprovante para o WhatsApp */
function gerarTextoWhatsAppFormatado() {
  const itens = Object.entries(E.carrinho).filter(([,q]) => q > 0);
  const sub    = calcSubtotal();
  const total  = calcTotal();
  const temDesconto = E.pgto === 'Pix' || E.pgto === 'Espécie';
  const dataFmt = E.data
    ? E.data.split('-').reverse().join('/')
    : new Date().toLocaleDateString('pt-BR');
  const hora = new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  const numPedido = String(E.numeroPedido).padStart(6, '0');

  const sep = '============================';
  const lin = '----------------------------';

  let m = `${sep}\n`;
  m += `        *QUALY QUIMY*\n`;
  m += `    Pedido nº ${numPedido}\n`;
  m += `   ${dataFmt}  ${hora}\n`;
  m += `${lin}\n`;
  m += `Cliente:       *${E.cliente}*\n`;
  m += `Vendedor:      ${E.vendedor}\n`;
  m += `${lin}\n`;

  itens.forEach(([id, qty]) => {
    const p = PRODUTOS.find(x => x.id == id);
    const nome = p.nome.split(' - ')[0];
    const total_item = `R$${brl(p.preco * qty)}`;
    const linha = `${nome} x${qty}`;
    // alinha à direita
    const espacos = Math.max(1, 28 - linha.length - total_item.length);
    m += `${linha}${' '.repeat(espacos)}${total_item}\n`;
    const cor = E.cores && E.cores[id] ? E.cores[id] : '';
    if (cor) m += `  🎨 Cor: ${cor}\n`;
  });

  m += `${lin}\n`;
  m += `Subtotal        R$${brl(sub)}\n`;
  if (temDesconto) {
    m += `Desconto (3%)  -R$${brl(sub * 0.03)}\n`;
  }
  m += `${lin}\n`;
  m += `*TOTAL*         *R$${brl(total)}*\n`;
  m += `${lin}\n`;
  m += `💳 Pgto: ${formatarPgto()}\n`;
  m += `${sep}\n`;
  m += `Obrigado! Volte sempre 😊`;

  return m;
}

// ══════════════════════════════════════════════
// PAGAMENTO
// ══════════════════════════════════════════════
function renderPgto() {
  const sub = calcSubtotal();
  const body = document.getElementById('pgto-body');

  const pgtoOpts = [
    { id:'Pix',     icon:'📱', lbl:'Pix',      desc:'-3% desconto', neutral:false },
    { id:'Espécie', icon:'💵', lbl:'Dinheiro',  desc:'-3% desconto', neutral:false },
    { id:'Cartão',  icon:'💳', lbl:'Cartão',    desc:'Sem desconto', neutral:true  },
    { id:'Cheque',  icon:'✍️', lbl:'Cheque',    desc:'Parcelado',    neutral:true  },
  ];

  let html = `<div class="pgto-grid">`;
  pgtoOpts.forEach(o => {
    html += `
    <div class="pgto-opt ${E.pgto===o.id?'sel':''}" onclick="selecionarPgto('${o.id}')">
      <div class="pgto-icon">${o.icon}</div>
      <div class="pgto-lbl">${o.lbl}</div>
      <div class="pgto-desc ${o.neutral?'neutral':''}">${o.desc}</div>
    </div>`;
  });
  html += `</div>`;

  if (E.pgto === 'Cartão' && !E.parcelas) {
    html += `<div class="parc-wrap"><div class="parc-title">Parcelamento — Cartão (sem juros)</div>`;
    [1,2,3].forEach(n => {
      html += `
      <div class="parc-opt ${E.parcelas===n?'sel':''}" onclick="selecionarParc(${n},'')">
        <div><div class="parc-opt-lbl">${n===1?'À vista':`${n}x sem juros`}</div></div>
        <div class="parc-opt-val">R$ ${brl(sub/n)}</div>
      </div>`;
    });
    html += `</div>`;
  }

  if (E.pgto === 'Cheque' && !E.parcelas) {
    html += `<div class="parc-wrap"><div class="parc-title">Parcelamento — Cheque</div>`;
    if (sub <= 1000) {
      html += `
      <div class="parc-opt" onclick="selecionarParc(2,'30/45 dias')">
        <div><div class="parc-opt-lbl">2x</div><div class="parc-opt-sub">30/45 dias</div></div>
        <div class="parc-opt-val">R$ ${brl(sub/2)}</div>
      </div>`;
    } else {
      html += `
      <div class="parc-opt" onclick="selecionarParc(3,'30/45/60 dias')">
        <div><div class="parc-opt-lbl">3x</div><div class="parc-opt-sub">30/45/60 dias</div></div>
        <div class="parc-opt-val">R$ ${brl(sub/3)}</div>
      </div>`;
    }
    html += `</div>`;
  }

  const pronto = E.pgto && (
    E.pgto === 'Pix' || E.pgto === 'Espécie' ||
    ((E.pgto === 'Cartão' || E.pgto === 'Cheque') && E.parcelas)
  );

  if (pronto) {
    const total = calcTotal();
    const desconto = E.pgto === 'Pix' || E.pgto === 'Espécie';
    html += `
    <div class="resumo-box">
      <div class="resumo-row"><span>Subtotal</span><span>R$ ${brl(sub)}</span></div>
      ${desconto ? `<div class="resumo-row"><span>Desconto (3%)</span><span>- R$ ${brl(sub*0.03)}</span></div>` : ''}
      <div class="resumo-row final"><span>Total final</span><span>R$ ${brl(total)}</span></div>
    </div>
    <div class="action-grid">
      <button class="btn-whats" onclick="fecharTudo(); abrirResumoPedido()">🧾 Ver Resumo</button>
      <button class="btn-pdf"   onclick="gerarPDF()">🖨️ PDF</button>
    </div>`;
  }

  body.innerHTML = html;
}

function selecionarPgto(tipo) {
  E.pgto = tipo; E.parcelas = null; E.diasCheque = '';
  renderPgto();
}

function selecionarParc(n, dias) {
  E.parcelas = n; E.diasCheque = dias;
  renderPgto();
}

function formatarPgto() {
  const sub = calcSubtotal();
  if (E.pgto === 'Pix')     return 'PIX (-3%)';
  if (E.pgto === 'Espécie') return 'DINHEIRO EM ESPECIE (-3%)';
  if (E.pgto === 'Cartão' && E.parcelas)
    return `${E.parcelas}x CARTÃO (R$ ${brl(sub/E.parcelas)})`;
  if (E.pgto === 'Cheque' && E.parcelas)
    return `${E.parcelas}x CHEQUE ${E.diasCheque} (R$ ${brl(sub/E.parcelas)})`;
  return E.pgto || '—';
}

function enviarWhats() {
  const m = gerarTextoWhatsAppFormatado();
  E.numeroPedido++;
  window.open(`https://api.whatsapp.com/send?phone=5511954950044&text=${encodeURIComponent(m)}`);
}

      <td style="padding:8px 12px;border-bottom:1px solid #eee;font-size:12px;text-align:right">R$ ${brl(p.preco)}</td>

  const el = document.getElementById('print-area');

    <div style="display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:20px;border-bottom:2px solid #1a1a2e;margin-bottom:22px">
      <div>
        <h1 style="font-size:26px;font-weight:800;color:#1a1a2e;margin:0;letter-spacing:-0.5px">QUALY QUIMY</h1>
        <p style="font-size:11px;color:#666;margin:4px 0 0;letter-spacing:2px;text-transform:uppercase">Pedido de Venda</p>
      </div>
      <div style="text-align:right">
        <p style="font-size:20px;font-weight:700;color:#1a1a2e;margin:0">Nº ${numPedido}</p>
        <p style="font-size:11px;color:#666;margin:3px 0 0">${dataFmt} — ${hora}</p>
      </div>
    </div>

    <!-- Dados -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px">
      <div style="background:#f8f8f8;border-radius:8px;padding:14px 16px">
        <p style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#888;margin:0 0 4px">Vendedor</p>
        <p style="font-size:14px;font-weight:600;color:#1a1a2e;margin:0">${E.vendedor}</p>
      </div>
      <div style="background:#f8f8f8;border-radius:8px;padding:14px 16px">
        <p style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#888;margin:0 0 4px">Cliente</p>
        <p style="font-size:14px;font-weight:600;color:#1a1a2e;margin:0">${E.cliente}</p>
      </div>
    </div>

    <!-- Tabela de itens -->
    <table style="width:100%;border-collapse:collapse;margin-bottom:20px">
      <thead>
        <tr style="background:#1a1a2e;color:#fff">
          <th style="padding:10px 12px;text-align:left;font-size:11px;letter-spacing:0.5px;font-weight:600">QTD</th>

        </div>
        ${temDesconto ? `<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:12px;color:#c0392b;border-top:1px solid #eee">
          <span>Desconto (3%)</span><span>- R$ ${brl(sub*0.03)}</span>

}

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function brl(v) { return v.toFixed(2).replace('.', ','); }

let toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2000);
}
